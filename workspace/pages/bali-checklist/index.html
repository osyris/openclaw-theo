<link href="https://fonts.googleapis.com/css2?family=Forum&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #4a0e1c;
  --primary-light: #6b1f30;
  --bg: #f5f0eb;
  --bg-card: #ffffff;
  --text: #2c2c2c;
  --text-light: #6b5e5e;
  --accent: #c4956a;
  --green: #4a7c59;
  --border: #e0d6cc;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; padding:2rem 1.5rem 1.5rem; text-align:center; position:sticky; top:0; z-index:100; }
.header h1 { font-family:'Forum',serif; font-size:1.8rem; margin-bottom:.3rem; }
.header .subtitle { font-size:.9rem; opacity:.85; margin-bottom:1rem; }
.progress-wrap { background:rgba(255,255,255,.2); border-radius:20px; height:12px; overflow:hidden; max-width:400px; margin:0 auto; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--accent),#e8c9a0); border-radius:20px; transition:width .4s ease; }
.progress-text { font-size:.8rem; margin-top:.4rem; opacity:.9; }
.container { max-width:700px; margin:0 auto; padding:1rem; }
.section { background:var(--bg-card); border-radius:16px; margin-bottom:1rem; box-shadow:0 2px 8px rgba(0,0,0,.06); overflow:hidden; }
.section-header { display:flex; align-items:center; gap:.6rem; padding:1rem 1.2rem; cursor:pointer; user-select:none; border-bottom:1px solid var(--border); }
.section-header:hover { background:rgba(74,14,28,.03); }
.section-icon { font-size:1.4rem; }
.section-title { font-family:'Forum',serif; font-size:1.2rem; color:var(--primary); flex:1; }
.section-count { font-size:.75rem; color:var(--text-light); background:var(--bg); padding:2px 8px; border-radius:10px; }
.section-arrow { transition:transform .3s; font-size:.8rem; color:var(--text-light); }
.section.collapsed .section-arrow { transform:rotate(-90deg); }
.section.collapsed .section-body { display:none; }
.section-body { padding:.5rem 0; }
.subsection { padding:.3rem 1.2rem .5rem; }
.subsection-title { font-size:.8rem; font-weight:700; color:var(--primary-light); text-transform:uppercase; letter-spacing:.5px; margin:.6rem 0 .3rem; padding-bottom:.2rem; border-bottom:1px dashed var(--border); }
.item { display:flex; align-items:flex-start; gap:.7rem; padding:.45rem 1.2rem; transition:background .15s; }
.item:hover { background:rgba(74,14,28,.02); }
.item input[type=checkbox] { display:none; }
.checkmark { width:22px; height:22px; min-width:22px; border:2px solid var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; margin-top:1px; }
.item input:checked ~ .checkmark { background:var(--green); border-color:var(--green); }
.item input:checked ~ .checkmark::after { content:'✓'; color:#fff; font-size:14px; font-weight:700; }
.item input:checked ~ .item-content .item-name { text-decoration:line-through; opacity:.5; }
.item-content { flex:1; cursor:pointer; }
.item-name { font-size:.95rem; line-height:1.3; }
.item-hint { font-size:.78rem; color:var(--text-light); margin-top:1px; line-height:1.3; }
.reset-btn { display:block; margin:1.5rem auto 2rem; padding:.6rem 1.5rem; background:none; border:2px solid var(--primary); color:var(--primary); border-radius:10px; font-family:'Nunito',sans-serif; font-size:.85rem; cursor:pointer; transition:all .2s; }
.reset-btn:hover { background:var(--primary); color:#fff; }
.footer { text-align:center; padding:1rem; font-size:.75rem; color:var(--text-light); }
@media(max-width:500px) {
  .header h1 { font-size:1.5rem; }
  .item { padding:.4rem 1rem; }
  .subsection { padding:.3rem 1rem .5rem; }
  .section-header { padding:.8rem 1rem; }
}
</style>
</head>

const LS_KEY='bali-checklist';
let state=JSON.parse(localStorage.getItem(LS_KEY)||'{}');

function save(){localStorage.setItem(LS_KEY,JSON.stringify(state));}

function toggle(id){
  state[id]=!state[id];
  save();
  render();
}

function toggleSection(idx){
  state['_s'+idx]=!state['_s'+idx];
  save();
  renderSections();
}

function getProgress(){
  let total=0,done=0;
  DATA.forEach((s,si)=>s.items.forEach((_,ii)=>{total++;if(state[si+'_'+ii])done++;}));
  return {total,done};
}

function render(){
  const{total,done}=getProgress();
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${done} из ${total} — ${pct}%`;
  document.querySelectorAll('.item input[type=checkbox]').forEach(cb=>{
    cb.checked=!!state[cb.dataset.id];
  });
  document.querySelectorAll('.item').forEach(el=>{
    const cb=el.querySelector('input');
    if(cb.checked){el.querySelector('.checkmark').classList.add('checked');}
    else{el.querySelector('.checkmark').classList.remove('checked');}
  });
  // update counts
  DATA.forEach((s,si)=>{
    const cnt=s.items.filter((_,ii)=>state[si+'_'+ii]).length;
    const el=document.querySelector(`[data-count="${si}"]`);
    if(el)el.textContent=`${cnt}/${s.items.length}`;
  });
}

function renderSections(){
  const app=document.getElementById('app');
  app.innerHTML=DATA.map((s,si)=>{
    const collapsed=state['_s'+si]?'collapsed':'';
    return`<div class="section ${collapsed}">
      <div class="section-header" onclick="toggleSection(${si})">
        <span class="section-icon">${s.icon}</span>
        <span class="section-title">${s.title}</span>
        <span class="section-count" data-count="${si}">0/${s.items.length}</span>
        <span class="section-arrow">▼</span>
      </div>
      <div class="section-body">
        ${s.items.map((it,ii)=>{
          const id=si+'_'+ii;
          return`<label class="item" for="cb${id}">
            <input type="checkbox" id="cb${id}" data-id="${id}" onchange="toggle('${id}')" ${state[id]?'checked':''}>
            <div class="checkmark"></div>
            <div class="item-content">
              <div class="item-name">${it.n}</div>
              ${it.h?`<div class="item-hint">${it.h}</div>`:''}
            </div>
          </label>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  render();
}

renderSections();
