<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Finds</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --card-hover: #1a1a1a;
    --text: #e8e8e8;
    --muted: #777;
    --border: #222;
    --accent: #e2b93b;
    --accent-glow: rgba(226,185,59,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    font-weight: 300;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 1.5rem 2rem 3rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
    pointer-events: none;
  }
  .back-btn {
    display: inline-block;
    padding: 0.4rem 1.2rem;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    color: #fff;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    transition: all 0.3s;
    position: relative;
    margin-bottom: 1.5rem;
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.5);
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-weight: 400;
    font-size: 5rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 80px var(--accent-glow);
    position: relative;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .hero p {
    color: var(--muted);
    font-size: 0.82rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    position: relative;
  }
  .count {
    display: inline-block;
    margin-top: 1rem;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    position: relative;
  }

  /* Filters */
  .filters {
    max-width: 900px;
    margin: 0 auto 1.5rem;
    padding: 0 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    align-items: center;
    position: relative;
  }
  .search-box {
    width: 100%;
    max-width: 400px;
    padding: 0.6rem 1rem;
    border: 1px solid var(--border);
    border-radius: 50px;
    background: var(--card);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.3s;
  }
  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: var(--accent); }

  .tag-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
  }
  .tag-btn {
    padding: 0.35rem 1rem;
    border: 1px solid var(--border);
    border-radius: 50px;
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.03em;
  }
  .tag-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .tag-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0a;
    font-weight: 500;
  }

  /* Grid */
  .grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem 5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 1.2rem;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  .card-img:hover { opacity: 0.85; }

  .card-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  .card-body {
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex: 1;
  }
  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }
  .card-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 1rem;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .card-link:hover { transform: scale(1.2); }

  .card-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: auto;
    padding-top: 0.3rem;
  }
  .card-tag {
    padding: 0.15rem 0.6rem;
    border-radius: 50px;
    background: rgba(226,185,59,0.12);
    color: var(--accent);
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Empty state */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .empty-emoji { font-size: 3rem; margin-bottom: 1rem; }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 2rem;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 12px;
    object-fit: contain;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.7rem;
    color: #333;
    border-top: 1px solid var(--border);
  }

  /* Mobile */
  @media (max-width: 600px) {
    .hero { padding: 1.5rem 1.5rem 2rem; }
    .hero h1 { font-size: 3.2rem; }
    .grid { grid-template-columns: 1fr; padding: 0 1rem 3rem; }
    .filters { padding: 0 1rem; }
    .search-box { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="hero">
  <a href="/pages/" class="back-btn">← Back</a>
  <h1>MY FINDS</h1>
  <p>Cool stuff, bright ideas & happy discoveries</p>
  <div class="count" id="count">0 finds</div>
</div>

<div class="filters">
  <input type="text" class="search-box" id="search" placeholder="Search finds...">
  <div class="tag-filters" id="tagFilters">
    <button class="tag-btn active" data-tag="all">All</button>
    <button class="tag-btn" data-tag="gift">🎁 Gift</button>
    <button class="tag-btn" data-tag="gadget">🔧 Gadget</button>
    <button class="tag-btn" data-tag="home">🏠 Home</button>
    <button class="tag-btn" data-tag="selfcare">💅 Self-care</button>
    <button class="tag-btn" data-tag="idea">💡 Idea</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<div class="footer">My Finds · 2026</div>

<script>
const TAG_EMOJI = { gift:'🎁', gadget:'🔧', home:'🏠', selfcare:'💅', idea:'💡' };
let finds = [];
let activeTag = 'all';
let searchQuery = '';

async function loadFinds() {
  try {
    const r = await fetch('finds.json?t=' + Date.now());
    finds = await r.json();
  } catch(e) { finds = []; }
  render();
}

function render() {
  const filtered = finds.filter(f => {
    if (activeTag !== 'all' && !f.tags.includes(activeTag)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const hay = (f.title + ' ' + f.description + ' ' + f.tags.join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('count').textContent = filtered.length + ' find' + (filtered.length !== 1 ? 's' : '');

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-emoji">🔍</div>No finds yet</div>';
    return;
  }

  grid.innerHTML = filtered.map(f => {
    const imgHtml = f.image
      ? `<img class="card-img" src="${f.image}" alt="${f.title}" onclick="openLightbox(this.src)">`
      : `<div class="card-placeholder">💡</div>`;
    const linkHtml = f.url
      ? `<a href="${f.url}" target="_blank" rel="noopener" class="card-link" title="Open link">🔗</a>`
      : '';
    const tagsHtml = f.tags.map(t =>
      `<span class="card-tag">${TAG_EMOJI[t] || ''} ${t}</span>`
    ).join('');

    return `<div class="card">
      ${imgHtml}
      <div class="card-body">
        <div class="card-header">
          <div class="card-title">${f.title}</div>
          ${linkHtml}
        </div>
        ${f.description ? `<div class="card-desc">${f.description}</div>` : ''}
        <div class="card-tags">${tagsHtml}</div>
      </div>
    </div>`;
  }).join('');
}

// Tag filters
document.getElementById('tagFilters').addEventListener('click', e => {
  if (!e.target.classList.contains('tag-btn')) return;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeTag = e.target.dataset.tag;
  render();
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// Lightbox
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lightboxImg').src = '';
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightboxImg').src = '';
  }
});

loadFinds();
</script>


<style id="oc-pager-top-style">
  .oc-top-btn{position:fixed;right:18px;bottom:18px;z-index:9999;border:none;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.18);background:#111;color:#fff;opacity:0;pointer-events:none;transition:.2s}
  .oc-top-btn.show{opacity:1;pointer-events:auto}
  .oc-pager{display:flex;gap:8px;justify-content:center;align-items:center;margin:18px 0 8px;flex-wrap:wrap}
  .oc-pager button{border:1px solid #ddd;background:#fff;padding:6px 10px;border-radius:10px;cursor:pointer}
  .oc-pager button:disabled{opacity:.45;cursor:not-allowed}
</style>
<script id="oc-pager-top-script">
(function(){
  // Back to top button for every page
  const topBtn=document.createElement('button');
  topBtn.className='oc-top-btn';
  topBtn.textContent='↑ Наверх';
  topBtn.setAttribute('aria-label','Наверх');
  topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  document.body.appendChild(topBtn);
  const onScroll=()=>topBtn.classList.toggle('show',window.scrollY>320);
  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();

  // Generic DOM pagination for long catalog pages
  const findContainer=()=>{
    const candidates=['.grid','.cards','.items','#grid','#cards','.catalog-grid','.products','.list'];
    for(const sel of candidates){
      const el=document.querySelector(sel);
      if(el && el.children && el.children.length>24) return el;
    }
    const all=[...document.querySelectorAll('main section, main div, section, .container > div')];
    return all.find(el=>el.children && el.children.length>24) || null;
  };

  const setupPager=()=>{
    if(document.querySelector('.oc-pager')) return;
    const container=findContainer();
    if(!container) return;
    const items=[...container.children].filter(el=>!el.classList.contains('oc-pager'));
    if(items.length<=24) return;

    let page=1; const pageSize=24; const pages=Math.ceil(items.length/pageSize);
    const pager=document.createElement('div'); pager.className='oc-pager';
    const prev=document.createElement('button'); prev.textContent='← Назад';
    const next=document.createElement('button'); next.textContent='Вперёд →';
    const meta=document.createElement('span');
    pager.append(prev,meta,next);
    container.after(pager);

    const render=()=>{
      const start=(page-1)*pageSize, end=start+pageSize;
      items.forEach((el,i)=>{el.style.display=(i>=start && i<end)?'':'none';});
      meta.textContent=`Страница ${page} / ${pages}`;
      prev.disabled=page===1; next.disabled=page===pages;
      window.scrollTo({top:0,behavior:'smooth'});
    };
    prev.onclick=()=>{if(page>1){page--;render();}};
    next.onclick=()=>{if(page<pages){page++;render();}};
    render();
  };

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>setTimeout(setupPager,250));
  else setTimeout(setupPager,250);
  const mo=new MutationObserver(()=>setTimeout(setupPager,100));
  mo.observe(document.body,{childList:true,subtree:true});
})();
</script>

</body>
</html>
