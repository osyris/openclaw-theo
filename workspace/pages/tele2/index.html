<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tele2 — Trial Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter',sans-serif;
            background: #f5f0eb;
            min-height: 100vh;
            padding: 0;
        }
        .header {
            background: #4a0e1c;
            padding: 16px 24px 40px;
            text-align: center;
        }
        .header h1 {
            font-family: 'Bebas Neue',sans-serif;
            font-weight: 400;
            font-size: 2.8rem;
            color: #f5f0eb;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .header .subtitle {
            font-family: 'Inter',sans-serif;
            font-size: 0.8rem;
            color: rgba(245, 240, 235, 0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            flex: 1;
            background: #fff;
            border-radius: 4px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(74, 14, 28, 0.08);
        }
        .stat-number {
            font-family: 'Bebas Neue',sans-serif;
            font-size: 2rem;
            color: #4a0e1c;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #8a7268;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .date-group-title {
            font-family: 'Bebas Neue',sans-serif;
            font-weight: 400;
            font-size: 1.1rem;
            color: #4a0e1c;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 14px 0 8px;
            border-bottom: 1px solid rgba(74, 14, 28, 0.1);
            margin-bottom: 10px;
            margin-top: 8px;
        }
        .section-title {
            font-family: 'Bebas Neue',sans-serif;
            font-weight: 400;
            font-size: 1.3rem;
            color: #4a0e1c;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(74, 14, 28, 0.15);
            margin-bottom: 14px;
            margin-top: 32px;
        }
        .trial-row {
            background: #fff;
            border-radius: 4px;
            padding: 14px 16px;
            margin-bottom: 6px;
            border: 1px solid rgba(74, 14, 28, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .trial-row:hover {
            background: #faf6f2;
        }
        .trial-row:active {
            background: #f5efe8;
        }
        .trial-row.urgent {
            border-left: 3px solid #c0392b;
        }
        .trial-row.ok {
            border-left: 3px solid #8a7268;
        }
        .trial-row.closed {
            border-left: 3px solid #d4ccc4;
            opacity: 0.5;
        }
        .trial-row-id {
            font-weight: 700;
            color: #2a2025;
            font-size: 0.95rem;
            flex: 1;
        }
        .trial-row-service {
            font-size: 0.82rem;
            color: #8a7268;
        }
        .trial-row-days {
            font-family: 'Bebas Neue',sans-serif;
            font-size: 1.1rem;
            color: #4a0e1c;
            min-width: 36px;
            text-align: center;
        }
        .trial-row-days small {
            display: block;
            font-family: 'Inter',sans-serif;
            font-size: 0.55rem;
            color: #8a7268;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .trial-badge-sm {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .badge-active { background: rgba(74, 14, 28, 0.08); color: #4a0e1c; }
        .badge-urgent { background: #c0392b; color: #fff; }
        .badge-closed { background: #e8e2dc; color: #8a7268; }

        /* Detail modal */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(42, 32, 37, 0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .overlay.open {
            display: flex;
        }
        .detail-card {
            background: #fff;
            border-radius: 6px;
            padding: 32px 28px;
            max-width: 420px;
            width: 100%;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .detail-close {
            position: absolute;
            top: 16px;
            right: 18px;
            font-size: 1.4rem;
            color: #b5a99d;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
        }
        .detail-close:hover { color: #4a0e1c; }
        .detail-id {
            font-family: 'Bebas Neue',sans-serif;
            font-size: 1.6rem;
            color: #4a0e1c;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(74, 14, 28, 0.06);
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label {
            font-size: 0.8rem;
            color: #8a7268;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-value {
            font-weight: 600;
            color: #2a2025;
            font-size: 0.95rem;
        }
        .detail-value.urgent-text { color: #c0392b; }
        .detail-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #4a0e1c;
            color: #f5f0eb;
            border: none;
            border-radius: 4px;
            font-family: 'Inter',sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .detail-btn:hover { background: #3a0a16; }
        .detail-btn.closed-btn {
            background: #e8e2dc;
            color: #8a7268;
            cursor: default;
        }
        .empty-message {
            color: #8a7268;
            font-style: italic;
            text-align: center;
            padding: 30px 0;
            font-size: 0.95rem;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(74, 14, 28, 0.25);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Bebas Neue',sans-serif;
        }
        @media (max-width: 480px) {
            .header { padding: 36px 20px 32px; }
            .header h1 { font-size: 2rem; letter-spacing: 4px; }
            .container { padding: 16px 12px 32px; }
            .stats { gap: 8px; }
            .stat-card { padding: 12px 8px; }
            .stat-number { font-size: 1.6rem; }
            .detail-card { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
      <div style="max-width:900px;margin:0 auto;padding:0 1.5rem;text-align:left;">
        <a href="/pages/" style="display:inline-block;padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.3);border-radius:2rem;font-family:'Inter',sans-serif;font-size:0.75rem;color:#fff;text-decoration:none;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.2s;opacity:0.7;" onmouseover="this.style.opacity='1';this.style.borderColor='rgba(255,255,255,0.6)'" onmouseout="this.style.opacity='0.7';this.style.borderColor='rgba(255,255,255,0.3)'">← Back</a>
      </div>
        <h1>Tele2</h1>
        <div class="subtitle">trial tracker</div>
    </div>

    <div class="container">
        <div class="stats" id="stats"></div>
        <div id="content"></div>
    </div>

    <div class="footer">updated <span id="updated"></span></div>

    <div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
        <div class="detail-card" id="detail"></div>
    </div>

    <script>
        let TRIALS_DATA = { updated: '', trials: [] };
        const TRIAL_DAYS = 28;
        const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

        // Load data from server API
        async function loadData() {
            try {
                const resp = await fetch('/pages-api/tele2');
                if (resp.ok) {
                    TRIALS_DATA = await resp.json();
                } else {
                    // Fallback to static JSON
                    const resp2 = await fetch('/pages/tele2/tele2.json');
                    TRIALS_DATA = await resp2.json();
                }
            } catch(e) {
                try {
                    const resp2 = await fetch('/pages/tele2/tele2.json');
                    TRIALS_DATA = await resp2.json();
                } catch(e2) {
                    console.error('Could not load data', e2);
                }
            }
            render();
        }

        function daysBetween(d1, d2) {
            return Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        function formatDateShort(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return `${d.getDate()} ${months[d.getMonth()]}`;
        }

        function getDeadline(startDate, trialDays) {
            const d = new Date(startDate + 'T00:00:00');
            d.setDate(d.getDate() + (trialDays || TRIAL_DAYS));
            return d.toISOString().slice(0, 10);
        }

        function render() {
            const today = new Date();
            today.setHours(0,0,0,0);

            let activeCount = 0, urgentCount = 0, closedCount = 0;
            const activeByDate = {};
            const closedList = [];

            TRIALS_DATA.trials.forEach(t => {
                const start = new Date(t.startDate + 'T00:00:00');
                const deadline = new Date(start);
                deadline.setDate(deadline.getDate() + (t.trialDays || TRIAL_DAYS));
                const daysLeft = daysBetween(today, deadline);
                t._daysLeft = daysLeft;
                t._deadline = deadline.toISOString().slice(0, 10);

                if (t.status === 'closed') {
                    closedCount++;
                    closedList.push(t);
                } else if (daysLeft <= 5) {
                    urgentCount++;
                    const key = t._deadline;
                    if (!activeByDate[key]) activeByDate[key] = [];
                    activeByDate[key].push({ ...t, urgent: true });
                } else {
                    activeCount++;
                    const key = t._deadline;
                    if (!activeByDate[key]) activeByDate[key] = [];
                    activeByDate[key].push({ ...t, urgent: false });
                }
            });

            // Stats
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${activeCount + urgentCount}</div><div class="stat-label">Активных</div></div>
                <div class="stat-card"><div class="stat-number">${urgentCount}</div><div class="stat-label">Срочных</div></div>
                <div class="stat-card"><div class="stat-number">${closedCount}</div><div class="stat-label">Закрыто</div></div>
            `;

            // Active grouped by date
            const sortedDates = Object.keys(activeByDate).sort();
            let html = '';

            if (sortedDates.length) {
                sortedDates.forEach(date => {
                    html += `<div class="date-group-title">⏰ Дедлайн: ${formatDate(date)}</div>`;
                    activeByDate[date].forEach(t => {
                        const type = t.urgent ? 'urgent' : 'ok';
                        const badgeClass = t.urgent ? 'badge-urgent' : 'badge-active';
                        const badgeText = t._daysLeft <= 0 ? 'Просрочен' : `${t._daysLeft} дн`;
                        html += `
                            <div class="trial-row ${type}" onclick="showDetail('${t.id}')">
                                <div class="trial-row-days">${t._daysLeft}<small>дней</small></div>
                                <div class="trial-row-id">${t.id}</div>
                                <div class="trial-row-service">${t.service}</div>
                                <span class="trial-badge-sm ${badgeClass}">${badgeText}</span>
                            </div>`;
                    });
                });
            } else if (!closedList.length) {
                html = '<div class="empty-message">Нет активных триалов — скажи Тео, чтобы добавить ☀️</div>';
            }

            // Closed
            if (closedList.length) {
                html += '<div class="section-title">Закрытые</div>';
                closedList.forEach(t => {
                    html += `
                        <div class="trial-row closed" onclick="showDetail('${t.id}')">
                            <div class="trial-row-days">—</div>
                            <div class="trial-row-id">${t.id}</div>
                            <div class="trial-row-service">${t.service}</div>
                            <span class="trial-badge-sm badge-closed">Закрыт</span>
                        </div>`;
                });
            }

            document.getElementById('content').innerHTML = html;
            document.getElementById('updated').textContent = TRIALS_DATA.updated;
        }

        function showDetail(id) {
            const t = TRIALS_DATA.trials.find(x => x.id === id);
            if (!t) return;

            const deadline = getDeadline(t.startDate, t.trialDays);
            const isClosed = t.status === 'closed';
            const daysClass = t._daysLeft <= 5 && !isClosed ? 'urgent-text' : '';

            document.getElementById('detail').innerHTML = `
                <button class="detail-close" onclick="closeDetail()">✕</button>
                <div class="detail-id">${t.id}</div>
                <div class="detail-row">
                    <span class="detail-label">Услуга</span>
                    <span class="detail-value">${t.service}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Старт</span>
                    <span class="detail-value">${formatDate(t.startDate)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Дедлайн (28 дн)</span>
                    <span class="detail-value ${daysClass}">${formatDate(deadline)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Осталось</span>
                    <span class="detail-value ${daysClass}">${isClosed ? '—' : (t._daysLeft <= 0 ? 'Просрочен' : t._daysLeft + ' дней')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Статус</span>
                    <span class="detail-value">${isClosed ? 'Закрыт' : 'Активен'}</span>
                </div>
                ${isClosed
                    ? '<button class="detail-btn closed-btn">Закрыт</button>'
                    : `<button class="detail-btn" onclick="closeTrial('${t.id}')">Закрыть триал</button>`
                }
            `;
            document.getElementById('overlay').classList.add('open');
        }

        function closeDetail() {
            document.getElementById('overlay').classList.remove('open');
        }

        async function closeTrial(id) {
            if (!confirm('Закрыть триал ' + id + '?')) return;
            try {
                const resp = await fetch('/pages-api/tele2/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                if (resp.ok) {
                    const result = await resp.json();
                    const trial = TRIALS_DATA.trials.find(t => t.id === id);
                    if (trial) trial.status = result.status;
                    closeDetail();
                    render();
                } else {
                    alert('Ошибка при закрытии триала');
                }
            } catch(e) {
                alert('Нет связи с сервером');
            }
        }

        loadData();
    </script>
</body>
</html>
