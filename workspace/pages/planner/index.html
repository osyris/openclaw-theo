<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📓 Weekly Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter',sans-serif;
            background: #f5f0eb;
            min-height: 100vh;
            padding: 0;
        }
        .header {
            background: #4a0e1c;
            padding: 16px 24px 40px;
            text-align: center;
        }
        .header h1 {
            font-family: 'Bebas Neue',sans-serif;
            font-weight: 400;
            font-size: 2.8rem;
            color: #f5f0eb;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .header .week-label {
            font-family: 'Inter',sans-serif;
            font-size: 0.8rem;
            color: rgba(245, 240, 235, 0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }
        .spread {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .page {
            background: #fff;
            border-radius: 4px;
            padding: 24px 20px 20px;
            position: relative;
            min-height: 280px;
            border: 1px solid rgba(74, 14, 28, 0.08);
        }
        .day-title {
            font-family: 'Bebas Neue',sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: #4a0e1c;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-date {
            font-family: 'Playfair Display',serif;
            font-size: 1rem;
            color: #8a7268;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(74, 14, 28, 0.1);
        }
        .day-tag {
            font-family: 'Inter',sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-work { background: rgba(74, 14, 28, 0.08); color: #4a0e1c; }
        .tag-off { background: rgba(74, 14, 28, 0.05); color: #8a7268; }
        .task {
            display: flex;
            align-items: flex-start;
            padding: 8px 0;
            gap: 10px;
            border-bottom: 1px solid rgba(74, 14, 28, 0.04);
        }
        .task:last-child { border-bottom: none; }
        .task.done { opacity: 0.4; }
        .task.done .task-name { text-decoration: line-through; }
        .cb {
            width: 20px;
            height: 20px;
            border: 2px solid #4a0e1c;
            border-radius: 50%;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 4px;
            transition: all 0.2s;
            background: transparent;
        }
        .cb.checked {
            background: #4a0e1c;
            border-color: #4a0e1c;
        }
        .cb.checked::after {
            content: "✓";
            color: #f5f0eb;
            font-size: 12px;
            font-weight: bold;
        }
        .task-emoji { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
        .task-content { flex: 1; }
        .task-time {
            font-family: 'Playfair Display',serif;
            font-size: 0.9rem;
            color: #8a7268;
        }
        .task-name {
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 600;
            color: #2a2025;
        }
        .subtasks { margin-top: 4px; padding-left: 2px; }
        .subtask {
            font-size: 0.85rem;
            color: #8a7268;
            padding: 2px 0;
        }
        .subtask::before { content: "– "; color: #b5a99d; }
        .empty-page {
            font-family: 'Playfair Display',serif;
            font-size: 1.2rem;
            color: #b5a99d;
            text-align: center;
            padding: 40px 10px;
            font-style: italic;
        }
        .progress-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .progress-track {
            flex: 1;
            height: 3px;
            background: rgba(74, 14, 28, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #4a0e1c;
            border-radius: 2px;
            transition: width 0.4s;
        }
        .progress-label {
            font-size: 0.8rem;
            color: #8a7268;
            white-space: nowrap;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(74, 14, 28, 0.25);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Bebas Neue',sans-serif;
        }

        @media (max-width: 700px) {
            .spread {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .header { padding: 36px 20px 32px; }
            .header h1 { font-size: 2.2rem; letter-spacing: 4px; }
            .container { padding: 16px 12px 32px; }
            .page { min-height: auto; }
        }
    </style>
</head>
<body>
    <div class="header">
      <div style="max-width:900px;margin:0 auto;padding:0 1.5rem;text-align:left;">
        <a href="/pages/" style="display:inline-block;padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.3);border-radius:2rem;font-family:'Inter',sans-serif;font-size:0.75rem;color:#fff;text-decoration:none;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.2s;opacity:0.7;" onmouseover="this.style.opacity='1';this.style.borderColor='rgba(255,255,255,0.6)'" onmouseout="this.style.opacity='0.7';this.style.borderColor='rgba(255,255,255,0.3)'">← Back</a>
      </div>
        <h1>WEEKLY PLANNER</h1>
        <div class="week-label">16 – 22 March 2026</div>
    </div>

    <div class="container" id="planner"></div>

    <div class="footer">Theo ☀️</div>

    <script>
        const days = [
            {
                key: 'mon', label: 'Monday', date: 'March 16',
                tags: [{ text: '🌴 Last day Bali', type: 'off' }],
                tasks: []
            },
            {
                key: 'tue', label: 'Tuesday', date: 'March 17',
                tags: [{ text: '✈️ Travel day', type: 'off' }],
                tasks: [
                    { time: "21:10", emoji: "✈️", name: "Flight DPS → IST (TK 0067)", subtasks: ["Code: VFQTV2", "Depart Bali 21:10 → Arrive Istanbul 00:40+1"] },
                    { emoji: "📱", name: "Tele2: закрыть ТВ+DigiKaitse 58507365" },
                    { emoji: "📱", name: "Tele2: закрыть страховку 5229913" },
                ]
            },
            {
                key: 'wed', label: 'Wednesday', date: 'March 18',
                tags: [{ text: '🏠 Home!', type: 'off' }],
                tasks: [
                    { time: "02:55–04:30", emoji: "✈️", name: "Flight IST → TLL (TK 1421)", subtasks: ["Code: VFQTV2", "Arrive Tallinn 04:30"] },
                    { time: "16:00", emoji: "💻", name: "Показать Антону Rutracker", subtasks: ["Чтобы мог скачивать фильмы"] },
                ]
            },
            {
                key: 'thu', label: 'Thursday', date: 'March 19',
                tags: [],
                tasks: [
                    { emoji: "💇", name: "Записаться в Juuste Akadeemia", subtasks: ["juusteakadeemia.ee", "Диагностика выпадения волос"] },
                ]
            },
            {
                key: 'fri', label: 'Friday', date: 'March 20',
                tags: [{ text: 'Work', type: 'work' }],
                tasks: [
                    { time: "9:30–21:00", emoji: "💼", name: "Work" },
                    { emoji: "📱", name: "Tele2: закрыть страховку 50305150025" },
                    { emoji: "📱", name: "Tele2: закрыть страховку 60306224925" },
                ]
            },
            {
                key: 'sat', label: 'Saturday', date: 'March 21',
                tags: [{ text: 'Work', type: 'work' }],
                tasks: [
                    { time: "9:30–21:00", emoji: "💼", name: "Work" },
                    { emoji: "📱", name: "Tele2: закрыть DigiKaitse 55953690" },
                    { emoji: "📱", name: "Tele2: закрыть страховку 39901070232" },
                    { emoji: "📱", name: "Tele2: закрыть страховку 38111100233" },
                ]
            },
            {
                key: 'sun', label: 'Sunday', date: 'March 22',
                tags: [{ text: 'Work', type: 'work' }],
                tasks: [
                    { time: "10:00–16:00", emoji: "💼", name: "Work" },
                    { time: "19:00–21:00", emoji: "✨", name: "Lashes — Julia Aga", subtasks: ["Niine põik 3, Tallinn"] },
                ]
            }
        ];

        function renderPage(day) {
            const stateKey = 'planner2_' + day.key;
            const state = JSON.parse(localStorage.getItem(stateKey) || '{}');
            let total = day.tasks.length, checked = 0;

            let tagsHtml = day.tags.map(t => `<span class="day-tag tag-${t.type}">${t.text}</span>`).join(' ');

            let tasksHtml = '';
            day.tasks.forEach((t, i) => {
                const isDone = state[i] !== undefined ? state[i] : (t.done || false);
                if (isDone) checked++;
                const doneClass = isDone ? ' done' : '';

                let subtasksHtml = '';
                if (t.subtasks) {
                    subtasksHtml = '<div class="subtasks">' +
                        t.subtasks.map(s => `<div class="subtask">${s}</div>`).join('') + '</div>';
                }

                tasksHtml += `
                    <div class="task${doneClass}">
                        <div class="cb${isDone ? ' checked' : ''}" onclick="toggle('${day.key}',${i})"></div>
                        <span class="task-emoji">${t.emoji}</span>
                        <div class="task-content">
                            ${t.time ? `<span class="task-time">${t.time}</span> ` : ''}
                            <span class="task-name">${t.name}</span>
                            ${subtasksHtml}
                        </div>
                    </div>`;
            });

            let progressHtml = '';
            if (total > 0) {
                const pct = Math.round(checked / total * 100);
                progressHtml = `
                    <div class="progress-mini">
                        <div class="progress-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                        <span class="progress-label">${checked}/${total}</span>
                    </div>`;
            }

            const emptyHtml = day.tasks.length === 0
                ? `<div class="empty-page">${day.tags.some(t=>t.type==='off') ? 'Day off ☀️' : 'nothing yet...'}</div>` : '';

            return `
                <div class="day-title">${day.label} ${tagsHtml}</div>
                <div class="day-date">${day.date}</div>
                ${progressHtml}
                ${tasksHtml}
                ${emptyHtml}`;
        }

        function renderAll() {
            const container = document.getElementById('planner');
            let html = '';

            for (let i = 0; i < days.length; i += 2) {
                const left = days[i];
                const right = days[i + 1];

                html += '<div class="spread">';
                html += `<div class="page">${renderPage(left)}</div>`;
                if (right) {
                    html += `<div class="page">${renderPage(right)}</div>`;
                }
                html += '</div>';
            }

            container.innerHTML = html;
        }

        window.toggle = function(dayKey, index) {
            const stateKey = 'planner2_' + dayKey;
            const state = JSON.parse(localStorage.getItem(stateKey) || '{}');
            const day = days.find(d => d.key === dayKey);
            const current = state[index] !== undefined ? state[index] : (day.tasks[index].done || false);
            state[index] = !current;
            localStorage.setItem(stateKey, JSON.stringify(state));
            renderAll();
        };

        renderAll();
    </script>

<style id="oc-pager-top-style">
  .oc-top-btn{position:fixed;right:18px;bottom:18px;z-index:9999;border:none;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.18);background:#111;color:#fff;opacity:0;pointer-events:none;transition:.2s}
  .oc-top-btn.show{opacity:1;pointer-events:auto}
  .oc-pager{display:flex;gap:8px;justify-content:center;align-items:center;margin:18px 0 8px;flex-wrap:wrap}
  .oc-pager button{border:1px solid #ddd;background:#fff;padding:6px 10px;border-radius:10px;cursor:pointer}
  .oc-pager button:disabled{opacity:.45;cursor:not-allowed}
</style>
<script id="oc-pager-top-script">
(function(){
  // Back to top button for every page
  const topBtn=document.createElement('button');
  topBtn.className='oc-top-btn';
  topBtn.textContent='↑ Наверх';
  topBtn.setAttribute('aria-label','Наверх');
  topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  document.body.appendChild(topBtn);
  const onScroll=()=>topBtn.classList.toggle('show',window.scrollY>320);
  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();

  // Generic DOM pagination for long catalog pages
  const findContainer=()=>{
    const candidates=['.grid','.cards','.items','#grid','#cards','.catalog-grid','.products','.list'];
    for(const sel of candidates){
      const el=document.querySelector(sel);
      if(el && el.children && el.children.length>24) return el;
    }
    const all=[...document.querySelectorAll('main section, main div, section, .container > div')];
    return all.find(el=>el.children && el.children.length>24) || null;
  };

  const setupPager=()=>{
    if(document.querySelector('.oc-pager')) return;
    const container=findContainer();
    if(!container) return;
    const items=[...container.children].filter(el=>!el.classList.contains('oc-pager'));
    if(items.length<=24) return;

    let page=1; const pageSize=24; const pages=Math.ceil(items.length/pageSize);
    const pager=document.createElement('div'); pager.className='oc-pager';
    const prev=document.createElement('button'); prev.textContent='← Назад';
    const next=document.createElement('button'); next.textContent='Вперёд →';
    const meta=document.createElement('span');
    pager.append(prev,meta,next);
    container.after(pager);

    const render=()=>{
      const start=(page-1)*pageSize, end=start+pageSize;
      items.forEach((el,i)=>{el.style.display=(i>=start && i<end)?'':'none';});
      meta.textContent=`Страница ${page} / ${pages}`;
      prev.disabled=page===1; next.disabled=page===pages;
      window.scrollTo({top:0,behavior:'smooth'});
    };
    prev.onclick=()=>{if(page>1){page--;render();}};
    next.onclick=()=>{if(page<pages){page++;render();}};
    render();
  };

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>setTimeout(setupPager,250));
  else setTimeout(setupPager,250);
  const mo=new MutationObserver(()=>setTimeout(setupPager,100));
  mo.observe(document.body,{childList:true,subtree:true});
})();
</script>

</body>
</html>
