<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📓 Планер — неделя 16-22 февраля</title>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #8b7355;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C8B75' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .notebook {
            max-width: 1100px;
            width: 100%;
        }
        .notebook-cover {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }
        .notebook-cover h1 {
            font-family: 'Pangolin', cursive;
            font-size: 2.6rem;
            color: #f5f0e8;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .notebook-cover .week-label {
            font-family: 'Pangolin', cursive;
            font-size: 1.3rem;
            color: #d4c8b0;
            margin-top: 4px;
        }
        .spread {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            margin-bottom: 24px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .page {
            background: #fdf8f0;
            padding: 24px 20px 20px;
            position: relative;
            min-height: 320px;
        }
        .page::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
        }
        .page-left {
            border-right: 1px solid #e0d5c4;
        }
        .page-left::before {
            right: 0;
            background: transparent;
        }
        .page-right::before {
            left: 0;
            background: transparent;
        }
        .page-right {
            border-left: 1px solid #d8ccb8;
            background: #fcf6ec;
        }
        /* Lined paper effect */
        .page-content {
            background-image: repeating-linear-gradient(
                transparent,
                transparent 31px,
                #e8ddd0 31px,
                #e8ddd0 32px
            );
            background-position: 0 4px;
            min-height: 200px;
            padding-top: 4px;
        }
        /* Red margin line */
        .page-left .page-content {
            border-left: 2px solid #e8b4b4;
            padding-left: 12px;
            margin-left: 8px;
        }
        .page-right .page-content {
            border-left: 2px solid #e8b4b4;
            padding-left: 12px;
            margin-left: 8px;
        }
        .day-title {
            font-family: 'Pangolin', cursive;
            font-size: 1.8rem;
            font-weight: 700;
            color: #5b4a3f;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .day-date {
            font-family: 'Pangolin', cursive;
            font-size: 1.2rem;
            color: #9b8b78;
            margin-bottom: 12px;
        }
        .day-tag {
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-work { background: #fff3e0; color: #e67e22; }
        .tag-off { background: #e8f5e9; color: #43a047; }
        .tag-today { background: #ede7f6; color: #7b1fa2; }
        .task {
            display: flex;
            align-items: flex-start;
            padding: 8px 0;
            gap: 10px;
            line-height: 32px;
        }
        .task.done { opacity: 0.45; }
        .task.done .task-name { text-decoration: line-through; }
        .cb {
            width: 22px;
            height: 22px;
            border: 2px solid #b8a898;
            border-radius: 4px;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            transition: all 0.15s;
            background: transparent;
        }
        .cb.checked {
            background: #8b7355;
            border-color: #8b7355;
        }
        .cb.checked::after {
            content: "✓";
            color: #fdf8f0;
            font-size: 15px;
            font-weight: bold;
        }
        .task-emoji { font-size: 1.3rem; flex-shrink: 0; margin-top: 5px; }
        .task-content { flex: 1; }
        .task-time {
            font-family: 'Pangolin', cursive;
            font-size: 1.05rem;
            color: #b8a898;
            font-weight: 600;
        }
        .task-name {
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 600;
            color: #4a3f35;
        }
        .task-name .urgent-mark {
            color: #c0392b;
            font-weight: 700;
        }
        .subtasks { margin-top: 2px; padding-left: 2px; }
        .subtask {
            font-size: 0.95rem;
            color: #8b7b68;
            padding: 2px 0;
            font-family: 'Pangolin', cursive;
        }
        .subtask::before { content: "– "; color: #b8a898; }
        .empty-page {
            font-family: 'Pangolin', cursive;
            font-size: 1.3rem;
            color: #c8b8a4;
            text-align: center;
            padding: 40px 10px;
            font-style: italic;
        }
        .progress-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .progress-track {
            flex: 1;
            height: 4px;
            background: #e8ddd0;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #8b7355;
            border-radius: 2px;
            transition: width 0.4s;
        }
        .progress-label {
            font-family: 'Pangolin', cursive;
            font-size: 1rem;
            color: #b8a898;
            white-space: nowrap;
        }
        /* Spiral binding dots */
        .spread::before {
            display: none;
        }
        .binding {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: -8px;
            position: relative;
            z-index: 2;
            padding: 4px 0;
        }
        .ring {
            width: 18px;
            height: 18px;
            border: 2.5px solid #999;
            border-radius: 50%;
            background: #8b7355;
        }
        /* Last page (odd) */
        .spread-single {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            margin-bottom: 24px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .page-blank {
            background: #f8f2e6;
            background-image: repeating-linear-gradient(
                transparent,
                transparent 31px,
                #e8ddd0 31px,
                #e8ddd0 32px
            );
            min-height: 320px;
            border-left: 1px solid #d8ccb8;
        }

        @media (max-width: 700px) {
            .spread, .spread-single {
                grid-template-columns: 1fr;
            }
            .page-left { border-right: none; border-bottom: 2px dashed #e0d5c4; }
            .page-right { border-left: none; }
            .page-blank { display: none; }
            .binding { display: none; }
            body { padding: 10px; }
            .notebook-cover h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="notebook">
        <div class="notebook-cover">
            <h1>📓 Мой планер</h1>
            <div class="week-label">неделя 16 – 22 февраля 2026</div>
        </div>
        <div id="planner"></div>
    </div>

    <script>
        const days = [
            {
                key: 'mon', label: 'Понедельник', date: '16 февраля', tags: [],
                tasks: []
            },
            {
                key: 'tue', label: 'Вторник', date: '17 февраля', tags: [],
                tasks: []
            },
            {
                key: 'wed', label: 'Среда', date: '18 февраля', tags: [],
                tasks: [
                    { time: "9:00–9:30", emoji: "🍳", name: "Завтрак", done: true },
                    { time: "10:00–11:00", emoji: "🦷", name: "Ортодонт", done: true },
                    { time: "11:00–11:30", emoji: "📞", name: "Записать детей к зубному", done: true },
                    { time: "11:30–12:00", emoji: "💳", name: "Заказать Антону карточку", done: true },
                    { time: "12:00–12:50", emoji: "🇬🇧", name: "Урок английского", done: true },
                    { time: "12:50–13:30", emoji: "🍽️", name: "Обед", done: true },
                    { time: "13:30–15:00", emoji: "🏠", name: "Встреча с хозяйкой", done: true },
                    { time: "15:30–16:00", emoji: "🏥", name: "Рентген Артёму", done: true },
                    { time: "18:00–19:00", emoji: "📝", name: "Подготовка к встрече с Юрой", done: true },
                    { time: "19:00–19:30", emoji: "📱", name: "Скрипт звонка Теле2", done: true },
                ]
            },
            {
                key: 'thu', label: 'Четверг', date: '19 февраля', tags: [],
                tasks: [
                    { time: "8:00–9:00", emoji: "🏋️", name: "Спорт" },
                    { time: "9:00–11:00", emoji: "📰", name: "Материалы по блогу + система хранения" },
                    { time: "11:00–11:30", emoji: "🍳", name: "Завтрак" },
                    { time: "11:30–13:30", emoji: "🤝", name: "Встреча с Юрой" },
                    { time: "13:30–16:00", emoji: "📰", name: "Продолжить блог / задачи" },
                    { time: "16:00–16:30", emoji: "🍽️", name: "Обед" },
                    { time: "16:30–17:00", emoji: "✉️", name: "Написать Лёше по поводу рублей" },
                    { time: "17:00–18:30", emoji: "🌴", name: "Бали — доработать", subtasks: [
                        "Аренда мотика",
                        "Активности",
                        "Спросить у Кости пожелания",
                        "Места покушать",
                        "Массаж"
                    ]},
                    { time: "18:30", emoji: "🧱", name: "Выставка Лего" },
                    { time: "23:00", emoji: "😴", name: "Сон" },
                ]
            },
            {
                key: 'fri', label: 'Пятница', date: '20 февраля',
                tags: [{ text: 'Работа', type: 'work' }],
                tasks: [
                    { time: "9:30–21:00", emoji: "📦", name: "Теле2 — инвентура" },
                ]
            },
            {
                key: 'sat', label: 'Суббота', date: '21 февраля',
                tags: [{ text: 'Работа', type: 'work' }],
                tasks: [
                    { time: "9:30–21:00", emoji: "💼", name: "Теле2" },
                ]
            },
            {
                key: 'sun', label: 'Воскресенье', date: '22 февраля',
                tags: [{ text: 'Выходной', type: 'off' }],
                tasks: []
            }
        ];

        function renderPage(day) {
            const stateKey = 'planner2_' + day.key;
            const state = JSON.parse(localStorage.getItem(stateKey) || '{}');
            let total = day.tasks.length, checked = 0;

            let tagsHtml = day.tags.map(t => `<span class="day-tag tag-${t.type}">${t.text}</span>`).join(' ');

            let tasksHtml = '';
            day.tasks.forEach((t, i) => {
                const isDone = state[i] !== undefined ? state[i] : (t.done || false);
                if (isDone) checked++;
                const doneClass = isDone ? ' done' : '';

                let subtasksHtml = '';
                if (t.subtasks) {
                    subtasksHtml = '<div class="subtasks">' +
                        t.subtasks.map(s => `<div class="subtask">${s}</div>`).join('') + '</div>';
                }

                tasksHtml += `
                    <div class="task${doneClass}">
                        <div class="cb${isDone ? ' checked' : ''}" onclick="toggle('${day.key}',${i})"></div>
                        <span class="task-emoji">${t.emoji}</span>
                        <div class="task-content">
                            ${t.time ? `<span class="task-time">${t.time}</span> ` : ''}
                            <span class="task-name">${t.name}</span>
                            ${subtasksHtml}
                        </div>
                    </div>`;
            });

            let progressHtml = '';
            if (total > 0) {
                const pct = Math.round(checked / total * 100);
                progressHtml = `
                    <div class="progress-mini">
                        <div class="progress-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                        <span class="progress-label">${checked}/${total}</span>
                    </div>`;
            }

            const emptyHtml = day.tasks.length === 0
                ? `<div class="empty-page">${day.tags.some(t=>t.type==='off') ? 'Выходной ☀️' : 'пока пусто...'}</div>` : '';

            return `
                <div class="day-title">${day.label} ${tagsHtml}</div>
                <div class="day-date">${day.date}</div>
                ${progressHtml}
                <div class="page-content">
                    ${tasksHtml}
                    ${emptyHtml}
                </div>`;
        }

        function renderAll() {
            const container = document.getElementById('planner');
            let html = '';

            for (let i = 0; i < days.length; i += 2) {
                const left = days[i];
                const right = days[i + 1];

                html += `<div class="binding">`;
                for (let r = 0; r < 8; r++) html += '<div class="ring"></div>';
                html += '</div>';

                if (right) {
                    html += `<div class="spread">
                        <div class="page page-left">${renderPage(left)}</div>
                        <div class="page page-right">${renderPage(right)}</div>
                    </div>`;
                } else {
                    html += `<div class="spread-single">
                        <div class="page page-left">${renderPage(left)}</div>
                        <div class="page page-blank"></div>
                    </div>`;
                }
            }

            container.innerHTML = html;
        }

        window.toggle = function(dayKey, index) {
            const stateKey = 'planner2_' + dayKey;
            const state = JSON.parse(localStorage.getItem(stateKey) || '{}');
            const day = days.find(d => d.key === dayKey);
            const current = state[index] !== undefined ? state[index] : (day.tasks[index].done || false);
            state[index] = !current;
            localStorage.setItem(stateKey, JSON.stringify(state));
            renderAll();
        };

        renderAll();
    </script>
</body>
</html>
