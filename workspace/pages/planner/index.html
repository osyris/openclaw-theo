<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📓 Планер — неделя 23 февраля – 1 марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #f5f0eb;
            min-height: 100vh;
            padding: 0;
        }
        .header {
            background: #4a0e1c;
            padding: 48px 24px 40px;
            text-align: center;
        }
        .header h1 {
            font-family: 'Forum', serif;
            font-weight: 400;
            font-size: 2.8rem;
            color: #f5f0eb;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .header .week-label {
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            color: rgba(245, 240, 235, 0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }
        .spread {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .page {
            background: #fff;
            border-radius: 4px;
            padding: 24px 20px 20px;
            position: relative;
            min-height: 280px;
            border: 1px solid rgba(74, 14, 28, 0.08);
        }
        .day-title {
            font-family: 'Forum', serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: #4a0e1c;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            color: #8a7268;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(74, 14, 28, 0.1);
        }
        .day-tag {
            font-family: 'Nunito', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-work { background: rgba(74, 14, 28, 0.08); color: #4a0e1c; }
        .tag-off { background: rgba(74, 14, 28, 0.05); color: #8a7268; }
        .task {
            display: flex;
            align-items: flex-start;
            padding: 8px 0;
            gap: 10px;
            border-bottom: 1px solid rgba(74, 14, 28, 0.04);
        }
        .task:last-child { border-bottom: none; }
        .task.done { opacity: 0.4; }
        .task.done .task-name { text-decoration: line-through; }
        .cb {
            width: 20px;
            height: 20px;
            border: 2px solid #4a0e1c;
            border-radius: 50%;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 4px;
            transition: all 0.2s;
            background: transparent;
        }
        .cb.checked {
            background: #4a0e1c;
            border-color: #4a0e1c;
        }
        .cb.checked::after {
            content: "✓";
            color: #f5f0eb;
            font-size: 12px;
            font-weight: bold;
        }
        .task-emoji { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
        .task-content { flex: 1; }
        .task-time {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
            color: #8a7268;
        }
        .task-name {
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 600;
            color: #2a2025;
        }
        .subtasks { margin-top: 4px; padding-left: 2px; }
        .subtask {
            font-size: 0.85rem;
            color: #8a7268;
            padding: 2px 0;
        }
        .subtask::before { content: "– "; color: #b5a99d; }
        .empty-page {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: #b5a99d;
            text-align: center;
            padding: 40px 10px;
            font-style: italic;
        }
        .progress-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .progress-track {
            flex: 1;
            height: 3px;
            background: rgba(74, 14, 28, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #4a0e1c;
            border-radius: 2px;
            transition: width 0.4s;
        }
        .progress-label {
            font-size: 0.8rem;
            color: #8a7268;
            white-space: nowrap;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(74, 14, 28, 0.25);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Forum', serif;
        }

        @media (max-width: 700px) {
            .spread {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .header { padding: 36px 20px 32px; }
            .header h1 { font-size: 2.2rem; letter-spacing: 4px; }
            .container { padding: 16px 12px 32px; }
            .page { min-height: auto; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Планер</h1>
        <div class="week-label">23 февраля – 1 марта 2026</div>
    </div>

    <div class="container" id="planner"></div>

    <div class="footer">Тео ☀️</div>

    <script>
        const days = [
            {
                key: 'mon', label: 'Понедельник', date: '23 февраля',
                tags: [{ text: 'Работа', type: 'work' }],
                tasks: [
                    { time: "9:30–21:00", emoji: "💼", name: "Work", subtasks: ["Lasnamäe Centrum"] },
                ]
            },
            {
                key: 'tue', label: 'Вторник', date: '24 февраля',
                tags: [{ text: 'Работа', type: 'work' }],
                tasks: [
                    { time: "9:30–19:00", emoji: "💼", name: "Work", subtasks: ["Lasnamäe Centrum"] },
                ]
            },
            {
                key: 'wed', label: 'Среда', date: '25 февраля',
                tags: [{ text: 'Работа', type: 'work' }],
                tasks: [
                    { time: "9:30–21:00", emoji: "💼", name: "Work", subtasks: ["Lasnamäe Centrum"] },
                    { time: "9:45–10:15", emoji: "🦷", name: "Ортодонт", subtasks: ["A. H. Tammsaare tee 56"] },
                    { emoji: "💊", name: "Посмотреть медикаменты для Бали", subtasks: ["Что взять в аптечку"] },
                ]
            },
            {
                key: 'thu', label: 'Четверг', date: '26 февраля',
                tags: [{ text: 'Работа', type: 'work' }],
                tasks: [
                    { time: "9:30–18:00", emoji: "💼", name: "Tele2 Lasnamäe Centrum" },
                ]
            },
            {
                key: 'fri', label: 'Пятница', date: '27 февраля',
                tags: [{ text: '🎂 ДР Артёма!', type: 'off' }],
                tasks: [
                    { time: "12:20–14:20", emoji: "💆", name: "Массаж лица", subtasks: ["Lastekodu 35"] },
                ]
            },
            {
                key: 'sat', label: 'Суббота', date: '28 февраля',
                tags: [],
                tasks: [
                    { time: "10:30–11:30", emoji: "🇬🇧", name: "English lesson", subtasks: ["Niine põik 3"] },
                ]
            },
            {
                key: 'sun', label: 'Воскресенье', date: '1 марта',
                tags: [{ text: 'Работа', type: 'work' }],
                tasks: [
                    { time: "9:30–19:00", emoji: "💼", name: "Work" },
                    { time: "19:00–21:00", emoji: "✨", name: "Ресницы (Юля Ага)" },
                ]
            }
        ];

        function renderPage(day) {
            const stateKey = 'planner2_' + day.key;
            const state = JSON.parse(localStorage.getItem(stateKey) || '{}');
            let total = day.tasks.length, checked = 0;

            let tagsHtml = day.tags.map(t => `<span class="day-tag tag-${t.type}">${t.text}</span>`).join(' ');

            let tasksHtml = '';
            day.tasks.forEach((t, i) => {
                const isDone = state[i] !== undefined ? state[i] : (t.done || false);
                if (isDone) checked++;
                const doneClass = isDone ? ' done' : '';

                let subtasksHtml = '';
                if (t.subtasks) {
                    subtasksHtml = '<div class="subtasks">' +
                        t.subtasks.map(s => `<div class="subtask">${s}</div>`).join('') + '</div>';
                }

                tasksHtml += `
                    <div class="task${doneClass}">
                        <div class="cb${isDone ? ' checked' : ''}" onclick="toggle('${day.key}',${i})"></div>
                        <span class="task-emoji">${t.emoji}</span>
                        <div class="task-content">
                            ${t.time ? `<span class="task-time">${t.time}</span> ` : ''}
                            <span class="task-name">${t.name}</span>
                            ${subtasksHtml}
                        </div>
                    </div>`;
            });

            let progressHtml = '';
            if (total > 0) {
                const pct = Math.round(checked / total * 100);
                progressHtml = `
                    <div class="progress-mini">
                        <div class="progress-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                        <span class="progress-label">${checked}/${total}</span>
                    </div>`;
            }

            const emptyHtml = day.tasks.length === 0
                ? `<div class="empty-page">${day.tags.some(t=>t.type==='off') ? 'Выходной ☀️' : 'пока пусто...'}</div>` : '';

            return `
                <div class="day-title">${day.label} ${tagsHtml}</div>
                <div class="day-date">${day.date}</div>
                ${progressHtml}
                ${tasksHtml}
                ${emptyHtml}`;
        }

        function renderAll() {
            const container = document.getElementById('planner');
            let html = '';

            for (let i = 0; i < days.length; i += 2) {
                const left = days[i];
                const right = days[i + 1];

                html += '<div class="spread">';
                html += `<div class="page">${renderPage(left)}</div>`;
                if (right) {
                    html += `<div class="page">${renderPage(right)}</div>`;
                }
                html += '</div>';
            }

            container.innerHTML = html;
        }

        window.toggle = function(dayKey, index) {
            const stateKey = 'planner2_' + dayKey;
            const state = JSON.parse(localStorage.getItem(stateKey) || '{}');
            const day = days.find(d => d.key === dayKey);
            const current = state[index] !== undefined ? state[index] : (day.tasks[index].done || false);
            state[index] = !current;
            localStorage.setItem(stateKey, JSON.stringify(state));
            renderAll();
        };

        renderAll();
    </script>
<script src="../sync.js"></script>
</body>
</html>
