  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --text: #e8e8e8;
    --muted: #777;
    --accent: #c9a84c;
    --accent-glow: rgba(201,168,76,0.2);
    --border: #222;

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.6; font-weight:300; }

  .hero {
    text-align:center; padding:1.5rem 1.5rem 3rem;
    position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; top:-80px; left:50%; transform:translateX(-50%);
    width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
    pointer-events:none;
  }
  .hero h1 {
    font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:4rem;
    letter-spacing:0.12em; color:var(--accent);
    text-transform:uppercase; text-shadow:0 0 60px var(--accent-glow);
    position:relative;
  }
  .hero p { color:var(--muted); font-size:0.82rem; letter-spacing:0.2em; text-transform:uppercase; position:relative; }

  .controls {
    max-width:900px; margin:0 auto; padding:0 1.5rem 0.5rem;
    display:flex; flex-wrap:wrap; gap:0.5rem; align-items:center;
  }
  .filter-btn {
    padding:0.55rem 1.3rem; border:1px solid var(--border); border-radius:2rem;
    background:var(--card); font-size:0.95rem; font-family:'Bebas Neue',sans-serif;
    cursor:pointer; transition:all 0.2s; color:#777;
    text-transform:uppercase; letter-spacing:0.1em;
  }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .grid {
    max-width:900px; margin:0 auto; padding:1rem 1.5rem 4rem;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:1rem;
  }

  .card {
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:1.5rem; text-decoration:none; color:var(--text);
    transition:all 0.25s; display:flex; flex-direction:column; gap:0.6rem;
    position:relative; overflow:hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0;
    width:100%; height:3px;
    background:linear-gradient(90deg, transparent, var(--cat-color, var(--accent)), transparent);
    opacity:0; transition:opacity 0.3s;
  }
  .card:hover {
    border-color:var(--cat-color, var(--accent));
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
  }
  .card:hover::before { opacity:1; }

  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; }
  .card-emoji { font-size:1.8rem; line-height:1; }
  .card-cat {
    font-size:0.6rem; text-transform:uppercase; letter-spacing:0.1em; font-weight:500;
    padding:0.15rem 0.6rem; border-radius:2rem;
    background:rgba(201,168,76,0.1); color:var(--cat-color, var(--accent));
    border:1px solid rgba(201,168,76,0.15);
    white-space:nowrap;
  }
  .card-name {
    font-family:'Bebas Neue',sans-serif; font-size:1.5rem;
    letter-spacing:0.04em; line-height:1.2;
  }
  .card-desc { font-size:0.78rem; color:var(--muted); line-height:1.5; flex:1; }
  .card-meta {
    display:flex; flex-wrap:wrap; gap:0.3rem; margin-top:auto;
    font-size:0.65rem;
  }
  .card-tag {
    padding:0.12rem 0.45rem; border-radius:2rem;
    background:rgba(255,255,255,0.05); color:#666;
    border:1px solid rgba(255,255,255,0.06);
  }
  .card-link {
    font-size:0.7rem; color:var(--cat-color, var(--accent));
    margin-top:0.3rem; opacity:0.7;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  .footer { text-align:center; padding:2rem; font-size:0.7rem; color:#333; border-top:1px solid var(--border); }

  @media(max-width:600px) {
    .hero h1 { font-size:2.8rem; }
    .grid { grid-template-columns:1fr; padding:0.5rem 1rem 3rem; }
  }
</style>

<style id="oc-pager-top-style">
  .oc-top-btn{position:fixed;right:18px;bottom:18px;z-index:9999;border:none;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.18);background:#111;color:#fff;opacity:0;pointer-events:none;transition:.2s}

  .oc-pager{display:flex;gap:8px;justify-content:center;align-items:center;margin:18px 0 8px;flex-wrap:wrap}
  .oc-pager button{border:1px solid #ddd;background:#fff;padding:6px 10px;border-radius:10px;cursor:pointer}
  .oc-pager button:disabled{opacity:.45;cursor:not-allowed}
  .oc-pager-nums{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .oc-page-num.active{background:#111;color:#fff;border-color:#111}
  .oc-pager-meta{font-size:12px;color:#666}
</style>
<script id="oc-pager-top-script">
(function(){
  // Back to top button for every page
  const topBtn=document.createElement('button');
  topBtn.className='oc-top-btn';
  topBtn.textContent='↑ Наверх';
  topBtn.setAttribute('aria-label','Наверх');
  topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  document.body.appendChild(topBtn);
  const onScroll=()=>topBtn.classList.toggle('show',window.scrollY>320);
  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();

  // Generic DOM pagination for long catalog pages
  const findContainer=()=>{
    const candidates=['.grid','.cards','.items','#grid','#cards','.catalog-grid','.products','.list'];
    for(const sel of candidates){
      const el=document.querySelector(sel);
      if(el && el.children && el.children.length>24) return el;
    }
    const all=[...document.querySelectorAll('main section, main div, section, .container > div')];
    return all.find(el=>el.children && el.children.length>24) || null;
  };

  const setupPager=()=>{
    if(document.querySelector('.oc-pager')) return;
    const container=findContainer();
    if(!container) return;
    const items=[...container.children].filter(el=>!el.classList.contains('oc-pager'));
    if(items.length<=24) return;

    let page=1; const pageSize=24; const pages=Math.ceil(items.length/pageSize);

    const makePager = () => {
      const pager=document.createElement('div'); pager.className='oc-pager';
      const prev=document.createElement('button'); prev.textContent='← Назад';
      const nums=document.createElement('div'); nums.className='oc-pager-nums';
      const next=document.createElement('button'); next.textContent='Вперёд →';
      const meta=document.createElement('span'); meta.className='oc-pager-meta';
      pager.append(prev,nums,next,meta);
      return {pager,prev,nums,next,meta};
    };

    const topPager = makePager();
    const bottomPager = makePager();
    container.before(topPager.pager);
    container.after(bottomPager.pager);

    const renderNums=(numsEl)=>{
      numsEl.innerHTML='';
      for(let i=1;i<=pages;i++){
        const b=document.createElement('button');
        b.textContent=String(i);
        b.className='oc-page-num'+(i===page?' active':'');
        b.addEventListener('click',()=>{page=i;render();});
        numsEl.appendChild(b);
      }
    };

    const syncPager=(p)=>{
      p.meta.textContent=`Страница ${page} / ${pages}`;
      p.prev.disabled=page===1; p.next.disabled=page===pages;
      renderNums(p.nums);
    };

    const render=()=>{
      const start=(page-1)*pageSize, end=start+pageSize;
      items.forEach((el,i)=>{el.style.display=(i>=start && i<end)?'':'none';});
      syncPager(topPager);
      syncPager(bottomPager);
      window.scrollTo({top:0,behavior:'smooth'});
    };

    const bindPager=(p)=>{
      p.prev.onclick=()=>{if(page>1){page--;render();}};
      p.next.onclick=()=>{if(page<pages){page++;render();}};
    };

    bindPager(topPager);
    bindPager(bottomPager);
    render();
  };

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>setTimeout(setupPager,250));
  else setTimeout(setupPager,250);
  const mo=new MutationObserver(()=>setTimeout(setupPager,100));
  mo.observe(document.body,{childList:true,subtree:true});
})();
</script>
