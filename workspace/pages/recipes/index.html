<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Collection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --card-hover: #222;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #e67e22;
    --accent-light: #f39c12;
    --accent-glow: rgba(230,126,34,0.4);
    --border: #2a2a2a;
    --surface: #141414;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; font-weight:300; min-height:100vh; }

  /* Hero */
  .hero {
    text-align:center; padding:1.5rem 1.5rem 3rem;
    background: linear-gradient(180deg, #1a0f05 0%, #0d0d0d 100%);
    position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle, rgba(230,126,34,0.15) 0%, transparent 70%);
    pointer-events:none;
  }
  .hero h1 {
    font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:4rem;
    letter-spacing:0.12em; color:var(--accent-light);
    text-transform:uppercase; text-shadow:0 0 60px var(--accent-glow);
    position:relative;
  }
  .hero p {
    color:var(--muted); font-size:0.85rem; letter-spacing:0.2em;
    text-transform:uppercase; margin-top:0.5rem; position:relative;
  }
  .back-btn {
    display:inline-block; margin-bottom:1.5rem;
    padding:0.4rem 1.2rem; border:1px solid rgba(255,255,255,0.3);
    border-radius:2rem; color:#fff; text-decoration:none;
    font-size:0.8rem; transition:all 0.2s; position:relative;
  }
  .back-btn:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.5); }

  /* Controls */
  .controls {
    max-width:1100px; margin:0 auto; padding:1.5rem 1.5rem 0.5rem;
    display:flex; flex-wrap:wrap; gap:0.5rem; align-items:center;
  }
  .search-box {
    flex:1; min-width:200px; padding:0.7rem 1.2rem;
    border:1px solid var(--border); border-radius:2rem;
    font-size:0.85rem; font-family:inherit;
    background:var(--surface); color:var(--text); outline:none;
    transition:border-color 0.2s;
  }
  .search-box:focus { border-color:var(--accent); box-shadow:0 0 15px rgba(230,126,34,0.15); }
  .search-box::placeholder { color:#555; }

  .cat-filters {
    max-width:1100px; margin:0 auto; padding:0.5rem 1.5rem;
    display:flex; flex-wrap:wrap; gap:0.35rem;
  }
  .cat-btn {
    padding:0.4rem 1rem; border:1px solid var(--border); border-radius:2rem;
    background:transparent; font-size:0.78rem; font-family:'Bebas Neue',sans-serif;
    cursor:pointer; transition:all 0.2s; color:#777;
    text-transform:uppercase; letter-spacing:0.08em;
  }
  .cat-btn:hover { border-color:var(--accent); color:var(--accent-light); }
  .cat-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .count {
    width:100%; text-align:right; font-size:0.75rem; color:var(--muted);
    padding:0.3rem 0; max-width:1100px; margin:0 auto;
    padding-left:1.5rem; padding-right:1.5rem;
  }

  /* Grid */
  .grid {
    max-width:1100px; margin:0 auto; padding:0.5rem 1.5rem 4rem;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:1rem;
  }

  /* Card */
  .card {
    background:var(--card); border:1px solid var(--border); border-radius:0.8rem;
    padding:0; transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s;
    display:flex; overflow:hidden; cursor:pointer; position:relative;
  }
  .card:hover {
    transform:translateY(-3px);
    box-shadow:0 8px 40px rgba(230,126,34,0.12);
    border-color:rgba(230,126,34,0.4);
  }

  .card-photo {
    width:120px; min-width:120px; height:180px;
    background:#111; flex-shrink:0; overflow:hidden; position:relative;
  }
  .card-photo img {
    width:100%; height:100%; object-fit:cover;
    transition:transform 0.3s;
  }
  .card:hover .card-photo img { transform:scale(1.05); }
  .card-photo .no-photo {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-size:2.5rem;
    background:linear-gradient(135deg,#1a0f05,#0d0d0d);
  }

  .card-body {
    flex:1; padding:1rem 1rem 0.8rem; display:flex; flex-direction:column; gap:0.3rem; min-width:0;
  }
  .card-title {
    font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700;
    line-height:1.3; color:#fff;
  }
  .card-title-en {
    font-size:0.75rem; color:var(--muted); font-style:italic; font-weight:300;
    line-height:1.3;
  }
  .card-desc {
    font-size:0.78rem; color:var(--muted); font-weight:300;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    margin-top:0.2rem;
  }
  .card-tags {
    display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:auto; padding-top:0.5rem;
    align-items:center;
  }
  .card-tag {
    font-size:0.7rem; color:var(--muted); display:flex; align-items:center; gap:0.2rem;
  }
  .card-cat-badge {
    font-size:0.62rem; padding:0.12rem 0.5rem; border-radius:2rem;
    background:rgba(230,126,34,0.12); color:var(--accent-light);
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .card-fav {
    position:absolute; top:0.5rem; right:0.5rem;
    font-size:0.9rem; opacity:0; transition:opacity 0.2s;
  }
  .card-fav.active { opacity:1; }
  .card:hover .card-fav { opacity:0.5; }
  .card-fav.active { opacity:1; color:#e74c3c; }

  .diff-easy { color:#27ae60; }
  .diff-medium { color:#f39c12; }
  .diff-hard { color:#e74c3c; }

  /* Empty state */
  .empty {
    grid-column:1/-1; text-align:center; padding:4rem 1rem;
    color:#444; font-size:0.9rem;
  }
  .empty-icon { font-size:3rem; margin-bottom:1rem; opacity:0.3; }

  /* Footer */
  .footer {
    text-align:center; padding:2rem; color:#333; font-size:0.7rem;
    letter-spacing:0.1em; text-transform:uppercase;
  }

  /* Modal */
  .modal-overlay {
    position:fixed; inset:0; z-index:1000;
    background:rgba(0,0,0,0.85);
    display:none; align-items:center; justify-content:center;
    padding:1rem; overflow-y:auto;
    opacity:0; transition:opacity 0.25s ease;
  }
  .modal-overlay.visible { opacity:1; }
  .modal-overlay.open { display:flex; }

  .modal-content {
    background:#1a1a1a; border-radius:1rem;
    max-width:520px; width:100%;
    padding:1.5rem; position:relative;
    transform:scale(0.95); transition:transform 0.25s ease;
    margin:auto; max-height:90vh; overflow-y:auto;
  }
  .modal-overlay.visible .modal-content { transform:scale(1); }

  .modal-close {
    position:absolute; top:0.8rem; right:0.8rem; z-index:2;
    width:2rem; height:2rem; border-radius:50%;
    background:rgba(255,255,255,0.1); border:none;
    color:#fff; font-size:1.2rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.2s;
  }
  .modal-close:hover { background:rgba(255,255,255,0.2); }

  .modal-photo {
    width:100%; max-height:50vh; object-fit:contain;
    border-radius:0.5rem; display:block; margin:0 auto 1rem;
  }
  .modal-no-photo {
    width:100%; height:250px; display:flex; align-items:center; justify-content:center;
    font-size:4rem;
    background:linear-gradient(135deg,#1a0f05,#0d0d0d);
    border-radius:0.5rem; margin-bottom:1rem;
  }

  .modal-title {
    font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700;
    color:#fff; line-height:1.3; margin-bottom:0.2rem;
  }
  .modal-title-en {
    font-size:0.85rem; color:var(--muted); font-style:italic; margin-bottom:0.6rem;
  }
  .modal-desc {
    font-size:0.88rem; color:#bbb; line-height:1.6; margin-bottom:0.8rem;
    font-style:italic; font-weight:300;
  }
  .modal-meta {
    display:flex; gap:0.8rem; flex-wrap:wrap; margin-bottom:1rem;
    font-size:0.82rem; color:var(--muted);
  }
  .modal-meta span { display:flex; align-items:center; gap:0.3rem; }

  .modal-section {
    margin-bottom:1rem;
  }
  .modal-section-title {
    font-family:'Bebas Neue',sans-serif; font-size:1.1rem; font-weight:400;
    letter-spacing:0.08em; color:var(--accent-light); margin-bottom:0.5rem;
  }
  .modal-section ul {
    list-style:none; padding:0;
  }
  .modal-section ul li {
    font-size:0.85rem; color:#ccc; padding:0.25rem 0; padding-left:1.2rem;
    position:relative; font-weight:300;
  }
  .modal-section ul li::before {
    content:'•'; position:absolute; left:0; color:var(--accent);
  }
  .modal-section ol {
    padding-left:1.5rem;
  }
  .modal-section ol li {
    font-size:0.85rem; color:#ccc; padding:0.3rem 0; font-weight:300;
  }
  .modal-section ol li::marker {
    color:var(--accent);
  }

  .modal-fav-btn {
    display:inline-flex; align-items:center; gap:0.4rem;
    padding:0.5rem 1.2rem; border:1px solid var(--border);
    border-radius:2rem; background:transparent;
    color:var(--muted); font-size:0.85rem; font-family:inherit;
    cursor:pointer; transition:all 0.2s; margin-top:0.5rem;
  }
  .modal-fav-btn:hover { border-color:var(--accent); color:var(--accent-light); }
  .modal-fav-btn.active { border-color:#e74c3c; color:#e74c3c; background:rgba(231,76,60,0.1); }

  /* Mobile */
  @media(max-width:600px) {
    .hero h1 { font-size:2.8rem; }
    .hero { padding:1.2rem 1rem 2rem; }
    .grid { grid-template-columns:1fr; }
    .card-photo { width:100px; min-width:100px; height:150px; }
    .controls { padding:1rem 1rem 0.5rem; }
    .cat-filters { padding:0.5rem 1rem; }
    .modal-content { padding:1.2rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <a href="/pages/" class="back-btn">← Back</a>
  <h1>RECIPE COLLECTION</h1>
  <p>Simple recipes, real flavors</p>
</div>

<div class="controls">
  <input type="text" class="search-box" placeholder="Search by name or ingredient..." id="search">
</div>

<div class="cat-filters" id="catFilters">
  <button class="cat-btn active" data-cat="all">All</button>
  <button class="cat-btn" data-cat="breakfast">Breakfast</button>
  <button class="cat-btn" data-cat="lunch">Lunch</button>
  <button class="cat-btn" data-cat="dinner">Dinner</button>
  <button class="cat-btn" data-cat="snack">Snack</button>
  <button class="cat-btn" data-cat="dessert">Dessert</button>
  <button class="cat-btn" data-cat="drink">Drink</button>
</div>

<div class="count" id="count"></div>

<div class="grid" id="grid"></div>

<div class="footer">Recipe Collection · 2026</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let recipes = [];
let favorites = JSON.parse(localStorage.getItem('recipe-favorites') || '{}');
let currentCat = 'all';
let searchQuery = '';

async function init() {
  const res = await fetch('recipes.json');
  recipes = await res.json();
  render();
  setupEvents();
}

function render() {
  const grid = document.getElementById('grid');
  const filtered = recipes.filter(r => {
    const catOk = currentCat === 'all' || r.category === currentCat;
    const q = searchQuery.toLowerCase();
    const searchOk = !q || r.title.toLowerCase().includes(q)
      || r.titleEn.toLowerCase().includes(q)
      || r.ingredients.some(i => i.toLowerCase().includes(q));
    return catOk && searchOk;
  });

  document.getElementById('count').textContent = filtered.length + ' recipe' + (filtered.length !== 1 ? 's' : '');

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🍽</div>No recipes found</div>';
    return;
  }

  grid.innerHTML = filtered.map((r, i) => {
    const idx = recipes.indexOf(r);
    const isFav = favorites[r.title];
    const diffClass = 'diff-' + r.difficulty;
    const photoHtml = `<div class="no-photo">🍽</div>`;
    return `
      <div class="card" data-idx="${idx}">
        <div class="card-photo">
          ${r.image ? `<img src="${r.image}" alt="${r.titleEn}" onerror="this.parentElement.innerHTML='<div class=no-photo>🍽</div>'">` : photoHtml}
        </div>
        <div class="card-body">
          <div class="card-title">${r.title}</div>
          <div class="card-title-en">${r.titleEn}</div>
          <div class="card-desc">${r.description}</div>
          <div class="card-tags">
            <span class="card-tag">⏱ ${r.time}</span>
            <span class="card-tag">🍽 ${r.servings}</span>
            <span class="card-tag ${diffClass}">${r.difficulty}</span>
            <span class="card-cat-badge">${r.category}</span>
          </div>
        </div>
        <span class="card-fav ${isFav ? 'active' : ''}">❤️</span>
      </div>
    `;
  }).join('');
}

function openModal(r) {
  const isFav = favorites[r.title];
  const diffClass = 'diff-' + r.difficulty;
  const photoHtml = r.image
    ? `<img class="modal-photo" src="${r.image}" alt="${r.titleEn}" onerror="this.outerHTML='<div class=modal-no-photo>🍽</div>'">`
    : '<div class="modal-no-photo">🍽</div>';

  document.getElementById('modalBody').innerHTML = `
    ${photoHtml}
    <div class="modal-title">${r.title}</div>
    <div class="modal-title-en">${r.titleEn}</div>
    <div class="modal-desc">${r.description}</div>
    <div class="modal-meta">
      <span>⏱ ${r.time}</span>
      <span>🍽 ${r.servings} порц.</span>
      <span class="${diffClass}">${r.difficulty}</span>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">📝 Ингредиенты</div>
      <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">👨‍🍳 Шаги приготовления</div>
      <ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
    </div>
    <button class="modal-fav-btn ${isFav ? 'active' : ''}" data-title="${r.title}">
      ❤️ ${isFav ? 'В избранном' : 'В избранное'}
    </button>
  `;

  const overlay = document.getElementById('modal');
  overlay.classList.add('open');
  requestAnimationFrame(() => overlay.classList.add('visible'));
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const overlay = document.getElementById('modal');
  overlay.classList.remove('visible');
  setTimeout(() => {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }, 250);
}

function toggleFav(title) {
  favorites[title] = !favorites[title];
  if (!favorites[title]) delete favorites[title];
  localStorage.setItem('recipe-favorites', JSON.stringify(favorites));
  render();
}

function setupEvents() {
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  document.getElementById('catFilters').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });

  document.getElementById('grid').addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    openModal(recipes[card.dataset.idx]);
  });

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  document.getElementById('modal').addEventListener('click', e => {
    const btn = e.target.closest('.modal-fav-btn');
    if (!btn) return;
    toggleFav(btn.dataset.title);
    btn.classList.toggle('active');
    btn.textContent = btn.classList.contains('active') ? '❤️ В избранном' : '❤️ В избранное';
  });
}

init();
</script>
</body>
</html>
