<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Collection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg: #ffffff; --card: #ffffff; --text: #1a1a1a; --muted: #888;
    --accent: #8B6914; --accent-glow: #a67c1a; --border: #e8e4e0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; font-weight:300; }

  .hero { text-align:center; padding:1.5rem 1.5rem 2.5rem; background:#0a0a0a; }
  .hero h1 { font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:3.5rem; letter-spacing:0.08em; margin-bottom:0.3rem; color:var(--accent); text-transform:uppercase; text-shadow:0 0 40px rgba(139,105,20,0.3); }
  .hero p { color:var(--muted); font-size:0.9rem; letter-spacing:0.15em; text-transform:uppercase; }

  .controls { max-width:960px; margin:0 auto; padding:1rem 1.5rem; display:flex; flex-wrap:wrap; gap:0.5rem; align-items:center; }
  .search-box { flex:1; min-width:200px; padding:0.6rem 1rem; border:1px solid var(--border); border-radius:2rem; font-size:0.85rem; font-family:inherit; background:#f8f6f4; color:var(--text); outline:none; }
  .search-box:focus { border-color:var(--accent); }
  .search-box::placeholder { color:#aaa; }
  .filter-btn { padding:0.6rem 1.4rem; border:1px solid #1a1a1a; border-radius:2rem; background:#0a0a0a; font-size:1rem; font-family:'Bebas Neue',sans-serif; cursor:pointer; transition:all 0.2s; color:#ccc; text-transform:uppercase; letter-spacing:0.12em; }
  .filter-btn:hover,.filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .count { width:100%; text-align:right; font-size:0.78rem; color:var(--muted); padding-top:0.3rem; }

  .alphabet-bar { max-width:960px; margin:0 auto; padding:0.3rem 1.5rem; display:flex; flex-wrap:wrap; gap:0.3rem; align-items:center; }
  .alpha-btn { width:32px; height:32px; border:1px solid var(--border); border-radius:50%; background:#fff; font-family:'Bebas Neue',sans-serif; font-size:0.95rem; cursor:pointer; transition:all 0.2s; color:var(--muted); display:flex; align-items:center; justify-content:center; letter-spacing:0.02em; }
  .alpha-btn:hover { border-color:var(--accent); color:var(--accent); }
  .alpha-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .alpha-btn.disabled { opacity:0.3; cursor:default; pointer-events:none; }

  .catalog-layout { max-width:1240px; margin:0 auto; padding:0 1rem 2.5rem; display:grid; grid-template-columns:250px 1fr; gap:1rem; align-items:start; }
  .genre-sidebar { position:sticky; top:12px; border:1px solid var(--border); border-radius:0.8rem; background:#fff; padding:0.8rem; max-height:calc(100vh - 24px); overflow:auto; }
  .genre-title { font-family:'Bebas Neue',sans-serif; letter-spacing:0.08em; color:var(--accent); font-size:1.2rem; margin-bottom:0.4rem; }
  .genre-bar { display:flex; flex-wrap:wrap; gap:0.35rem; align-items:flex-start; }
  .genre-sidebar .genre-bar { display:flex; flex-direction:column; align-items:stretch; }
  .genre-btn { padding:0.4rem 1rem; border:1px solid var(--border); border-radius:2rem; background:#fff; font-size:0.75rem; font-family:'Inter',sans-serif; cursor:pointer; transition:all 0.2s; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; font-weight:400; text-align:left; }
  .genre-btn:hover { border-color:var(--accent); color:var(--accent); }
  .genre-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .catalog-main { min-width:0; }
  .status-bar { max-width:960px; margin:0 auto; padding:0.3rem 1.5rem 0.5rem; display:flex; flex-wrap:wrap; gap:0.35rem; align-items:center; }
  .status-btn { padding:0.4rem 1rem; border:1px solid var(--border); border-radius:2rem; background:#fff; font-size:0.75rem; font-family:'Inter',sans-serif; cursor:pointer; transition:all 0.2s; color:var(--muted); letter-spacing:0.06em; font-weight:400; display:flex; align-items:center; gap:0.3rem; }
  .status-btn:hover { border-color:var(--accent); color:var(--accent); }
  .status-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .status-badge { display:inline-flex; align-items:center; gap:0.2rem; font-size:0.58rem; padding:0.15rem 0.45rem; border-radius:1rem; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; z-index:2; flex-shrink:0; }
  .status-badge.read { background:#e8f5e9; color:#2e7d32; }
  .status-badge.wishlist { background:#fff3e0; color:#e65100; }

  .grid { max-width:960px; margin:0 auto; padding:0.5rem 1.5rem 3rem; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:0.8rem; padding:1.2rem; transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s; display:flex; gap:1rem; position:relative; cursor:pointer; }
  .card:hover { transform:translateY(-2px); box-shadow:0 6px 30px rgba(139,105,20,0.08); border-color:rgba(139,105,20,0.3); }

  .card-img { position:relative; width:75px; min-width:75px; height:95px; border-radius:0.8rem; overflow:hidden; flex-shrink:0; background:#f5f3f0; display:flex; align-items:center; justify-content:center; }
  .card-img img { width:100%; height:100%; object-fit:contain; }
  .card-img .initials { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:#fff; width:100%; height:100%; display:flex; align-items:center; justify-content:center; text-shadow:0 0 10px rgba(139,105,20,0.5); }

  .card-body { flex:1; display:flex; flex-direction:column; gap:0.3rem; min-width:0; }
  .card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; }
  .card-brand { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.14em; color:var(--accent); font-weight:500; }
  .card-author { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.14em; color:var(--accent); font-weight:500; }
  .card-price { font-size:0.73rem; font-weight:500; color:var(--accent); background:rgba(139,105,20,0.06); padding:0.12rem 0.5rem; border-radius:1rem; white-space:nowrap; }
  .card-name { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; line-height:1.25; }
  .card-notes { font-size:0.74rem; color:var(--muted); font-style:italic; }
  .card-desc { font-size:0.77rem; color:#666; flex:1; }
  .card-tags { display:flex; flex-wrap:wrap; gap:0.25rem; margin-top:0.1rem; }
  .tag { font-size:0.63rem; padding:0.13rem 0.45rem; border-radius:0; text-transform:uppercase; letter-spacing:0.04em; }
  .card-source { font-size:0.65rem; color:#bbb; border-top:1px solid var(--border); padding-top:0.3rem; margin-top:auto; }
  .fav-ribbon { position:absolute; top:0; left:0; width:3.5rem; height:3.5rem; overflow:hidden; z-index:2; pointer-events:none; }
  .fav-ribbon::after { content:''; position:absolute; top:-1rem; left:-1.5rem; width:4rem; height:2rem; background:var(--accent); transform:rotate(-45deg); }

  /* Modal */
  .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.45); z-index:100; backdrop-filter:blur(4px); justify-content:center; align-items:flex-start; padding:2rem 1rem; overflow-y:auto; }
  .modal-overlay.open { display:flex; }
  .modal { background:#fff; border-radius:1rem; max-width:680px; width:100%; padding:0; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.2); margin:auto; overflow:hidden; }
  .modal-close { position:absolute; top:0.8rem; right:0.8rem; background:rgba(255,255,255,0.9); border:none; font-size:1.3rem; cursor:pointer; color:#999; line-height:1; z-index:2; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .modal-close:hover { color:var(--accent); }

  .m-hero { display:flex; gap:1.5rem; padding:2rem 2rem 1.5rem; background:#faf9f7; border-bottom:1px solid #e8e4e0; }
  .m-hero-left { display:flex; flex-direction:column; align-items:center; gap:0.6rem; }
  .m-photo { width:160px; min-width:160px; height:210px; background:#fff; border-radius:0.5rem; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .m-photo img { width:100%; height:100%; object-fit:contain; }
  .m-photo .initials { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; color:#fff; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#3a1520,#1a0a10); }
  .m-rating-block { text-align:center; }
  .m-rating-stars { font-size:1.1rem; color:#e8a84a; }
  .m-rating-count { font-size:0.7rem; color:#999; }
  .m-hero-right { flex:1; display:flex; flex-direction:column; gap:0.8rem; }
  .m-title { }
  .m-brand { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.12em; color:#999; font-weight:400; margin-bottom:0.15rem; }
  .m-author { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.12em; color:#999; font-weight:400; margin-bottom:0.15rem; }
  .m-name { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; line-height:1.2; margin-bottom:0.1rem; color:var(--text); }
  .m-subtitle { font-size:0.75rem; color:#999; }
  .m-meta-pills { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:0.3rem; }
  .m-pill { font-size:0.68rem; padding:0.18rem 0.55rem; border-radius:2rem; background:#f0ece8; color:#888; border:1px solid #e0dcd8; text-transform:uppercase; letter-spacing:0.04em; }
  .m-price-big { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; color:var(--accent); }
  .m-price { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--accent); }

  .m-hero-accords { flex:1; }
  .m-hero-accords .accord-bar { margin-bottom:0.25rem; }

  .m-profile-box { background:#faf9f7; border:1px solid #e8e4e0; border-radius:0.5rem; padding:0.7rem; }
  .m-profile-row { display:flex; gap:0.8rem; margin-bottom:0.5rem; justify-content:center; }
  .m-profile-item { display:flex; flex-direction:column; align-items:center; min-width:60px; }
  .m-profile-icon { font-size:1.1rem; }
  .m-profile-value { font-size:0.8rem; font-weight:500; color:var(--text); }
  .m-profile-label { font-size:0.6rem; text-transform:uppercase; letter-spacing:0.06em; color:#999; }
  .m-profile-seasons { display:flex; gap:0.3rem; flex-wrap:wrap; justify-content:center; }
  .m-profile-season { font-size:0.65rem; padding:0.15rem 0.45rem; border-radius:2rem; background:#eee; color:#999; }
  .m-profile-season.active { color:#fff; }
  .m-profile-season.day.active { background:#f0c850; color:#7a6020; }
  .m-profile-season.night.active { background:#5a6a8a; }
  .m-profile-season.winter.active { background:#7bafd4; }
  .m-profile-season.spring.active { background:#a0c87a; }
  .m-profile-season.summer.active { background:#e8c84a; }
  .m-profile-season.autumn.active { background:#d4956a; }

  .m-content { padding:1.5rem 2rem 2rem; background:#fff; }

  .m-accords { margin-bottom:1rem; }
  .m-section-title { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.14em; color:#999; font-weight:500; margin-bottom:0.5rem; }
  .accord-bar { display:flex; align-items:center; margin-bottom:0.25rem; gap:0.5rem; }
  .accord-fill { height:22px; border-radius:3px; min-width:30px; transition:width 0.4s ease; display:flex; align-items:center; padding-left:0.5rem; }
  .accord-label { font-size:0.73rem; color:#fff; white-space:nowrap; text-shadow:0 1px 2px rgba(0,0,0,0.3); }

  .m-stats { display:none; }
  .m-seasons { display:none; }

  .m-pyramid { margin-bottom:1.5rem; }
  .pyramid-level { margin-bottom:1rem; }
  .pyramid-divider { display:flex; align-items:center; gap:1rem; margin-bottom:0.8rem; }
  .pyramid-divider::before, .pyramid-divider::after { content:''; flex:1; height:1px; background:#e0dcd8; }
  .pyramid-divider span { font-size:0.7rem; font-weight:500; text-transform:uppercase; letter-spacing:0.12em; color:#999; white-space:nowrap; }
  .note-bubbles { display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:flex-start; }
  .note-bubble { display:flex; flex-direction:column; align-items:center; gap:0.3rem; width:72px; }
  .note-circle { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; background:#f5f3f0; border:2px solid #e8e4e0; transition:transform 0.2s, border-color 0.2s; cursor:default; }
  .note-circle:hover { transform:scale(1.08); border-color:var(--accent); }
  .note-name { font-size:0.65rem; color:#666; text-align:center; line-height:1.2; max-width:72px; overflow:hidden; text-overflow:ellipsis; }

  .m-desc { margin-bottom:1.5rem; }
  .m-desc-text { font-size:0.88rem; color:#555; line-height:1.7; }

  .m-details { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem 1.5rem; margin-bottom:1.5rem; }
  .m-detail { display:flex; flex-direction:column; }
  .m-detail-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em; color:#555; margin-bottom:0.1rem; }
  .m-detail-value { font-size:0.85rem; color:var(--text); }

  .m-tags { display:flex; flex-wrap:wrap; gap:0.3rem; margin-bottom:1.2rem; }
  .m-source { font-size:0.72rem; color:#bbb; border-top:1px solid #e8e4e0; padding-top:0.8rem; }

  .genre-menu-btn { display:none; position:fixed; left:16px; bottom:18px; z-index:9998; border:none; border-radius:999px; background:var(--accent); color:#fff; padding:10px 14px; font-weight:600; cursor:pointer; box-shadow:0 8px 24px rgba(0,0,0,.18); }
  .genre-menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:10001; display:none; align-items:flex-end; justify-content:center; }
  .genre-menu-overlay.open { display:flex; }
  .genre-menu { width:min(560px,96vw); max-height:78vh; overflow:auto; background:#fff; border-radius:16px 16px 0 0; padding:14px; }
  .genre-menu-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .genre-menu-close { border:none; background:#eee; width:32px; height:32px; border-radius:50%; cursor:pointer; }

  @media(max-width:980px) {
    .catalog-layout { grid-template-columns:1fr; }
    .genre-sidebar { display:none; }
    .genre-menu-btn { display:block; }
  }

  @media(max-width:600px) {
    .hero h1 { font-size:2.5rem; }
    .grid { grid-template-columns:1fr; }
    .card-img { width:60px; min-width:60px; height:78px; }
    .m-hero { flex-direction:column; align-items:center; text-align:center; padding:1.5rem; }
    .m-photo { width:130px; min-width:130px; height:170px; }
    .m-meta-pills { justify-content:center; }
    .m-content { padding:1.2rem 1.5rem 1.5rem; }
    .m-details { grid-template-columns:1fr; }
    .note-bubble { width:60px; }
    .note-circle { width:44px; height:44px; font-size:1.1rem; }
  }
</style>
</head>
<body>
<div class="hero">
  <div style="max-width:900px;margin:0 auto;padding:0 1.5rem;text-align:left;">
    <a href="/pages/" style="display:inline-block;padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.3);border-radius:2rem;font-family:'Inter',sans-serif;font-size:0.75rem;color:#fff;text-decoration:none;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.2s;opacity:0.7;" onmouseover="this.style.opacity='1';this.style.borderColor='rgba(255,255,255,0.6)'" onmouseout="this.style.opacity='0.7';this.style.borderColor='rgba(255,255,255,0.3)'">← Back</a>
  </div>
  <h1>BOOK COLLECTION</h1>
  <p>Book Collection</p>
</div>

<div class="controls">
  <input type="text" class="search-box" placeholder="Поиск по названию, автору..." id="search">
  <div class="count" id="count"></div>
</div>

<div class="catalog-layout">
  <aside class="genre-sidebar">
    <div class="genre-title">Жанры</div>
    <div class="genre-bar" id="genreBar"></div>
  </aside>
  <section class="catalog-main">
    <div class="alphabet-bar" id="alphabetBar"></div>
    <div class="status-bar" id="statusBar"></div>
    <div class="grid" id="grid"></div>
  </section>
</div>

<button class="genre-menu-btn" id="genreMenuBtn" type="button">Жанры</button>
<div class="genre-menu-overlay" id="genreMenuOverlay" aria-hidden="true">
  <div class="genre-menu" role="dialog" aria-label="Выбор жанра">
    <div class="genre-menu-head">
      <strong>Жанры</strong>
      <button class="genre-menu-close" id="genreMenuClose" type="button">✕</button>
    </div>
    <div class="genre-bar" id="genreMenuList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

  const available = new Set(items.map(p => (p.surname || '')[0]?.toUpperCase()).filter(Boolean));
  alphabetBar.innerHTML = letters.map(l => 
    `<button class="alpha-btn${available.has(l) ? '' : ' disabled'}" data-letter="${l}">${l}</button>`
  ).join('');
  alphabetBar.addEventListener('click', e => {
    const btn = e.target.closest('.alpha-btn');
    if (!btn || btn.classList.contains('disabled')) return;
    const letter = btn.dataset.letter;
    if (activeLetter === letter) { activeLetter = null; btn.classList.remove('active'); }
    else {
      alphabetBar.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeLetter = letter;
    }
    render();
  });
}

// Build genre bar + popup menu
function buildGenres() {
  const allGenres = new Set();
  items.forEach(p => (p.genre || []).forEach(g => allGenres.add(g)));
  const sorted = [...allGenres].sort((a,b) => a.localeCompare(b,'ru'));
  const html = `<button class="genre-btn active" data-genre="">Все</button>` +
    sorted.map(g => `<button class="genre-btn" data-genre="${g}">${g}</button>`).join('');
  genreBar.innerHTML = html;
  genreMenuList.innerHTML = html;

  const applyGenreState = () => {
    document.querySelectorAll('#genreBar .genre-btn, #genreMenuList .genre-btn').forEach(b => {
      const v = b.dataset.genre || null;
      b.classList.toggle('active', (activeGenre === null ? v === null : v === activeGenre));
    });
  };

  const onGenreClick = (e) => {
    const btn = e.target.closest('.genre-btn');
    if (!btn) return;
    const genre = btn.dataset.genre || null;
    activeGenre = genre;
    applyGenreState();
    if (!genre) {
      activeLetter = null;
      alphabetBar.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
      search.value = '';
    }
    genreMenuOverlay.classList.remove('open');
    render();
  };

  genreBar.addEventListener('click', onGenreClick);
  genreMenuList.addEventListener('click', onGenreClick);

  genreMenuBtn.addEventListener('click', () => genreMenuOverlay.classList.add('open'));
  genreMenuClose.addEventListener('click', () => genreMenuOverlay.classList.remove('open'));
  genreMenuOverlay.addEventListener('click', (e) => { if (e.target === genreMenuOverlay) genreMenuOverlay.classList.remove('open'); });

  applyGenreState();
}

// Build status bar
function buildStatus() {
  const readCount = items.filter(p => p.status === 'read').length;
  const wishCount = items.filter(p => p.status === 'wishlist').length;
  statusBar.innerHTML = `
    <button class="status-btn active" data-status="">📚 Все (${items.length})</button>
    <button class="status-btn" data-status="read">✅ Прочитано (${readCount})</button>
    <button class="status-btn" data-status="wishlist">📖 Хочу прочитать (${wishCount})</button>`;
  statusBar.addEventListener('click', e => {
    const btn = e.target.closest('.status-btn');
    if (!btn) return;
    const status = btn.dataset.status;
    statusBar.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStatus = status || null;
    render();
  });
}

function render() {
  const q = search.value.toLowerCase();
  const filtered = items.map((p,i)=>({...p,idx:i})).filter(p => {
    if (q && ![p.name, p.author, p.desc, p.original, p.source, p.surname].join(' ').toLowerCase().includes(q)) return false;
    if (activeLetter && (p.surname || '')[0]?.toUpperCase() !== activeLetter) return false;
    if (activeGenre && !(p.genre || []).includes(activeGenre)) return false;
    if (activeStatus && p.status !== activeStatus) return false;
    return true;
  });
  countEl.textContent = filtered.length + ' из ' + items.length + ' книг';
  grid.innerHTML = filtered.map(p => `
    <div class="card" onclick="openModal(${p.idx})">
      <div class="card-img"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
      <div class="card-body">
        <div style="display:flex;justify-content:flex-end;"><span class="status-badge ${p.status}">${p.status==='read'?'✅ Прочитано':'📖 Хочу прочитать'}</span></div>
        <div class="card-header"><div class="card-author">${p.author}</div></div>
        <div class="card-name">${p.name}</div>
        ${p.original ? `<div class="card-desc" style="font-style:italic;font-size:0.72rem;color:#999">${p.original}</div>` : ''}
        <div class="card-desc">${p.desc}</div>
        ${(p.genre||[]).length ? `<div class="card-tags">${p.genre.map(g=>`<span class="tag" style="background:rgba(139,105,20,0.08);color:var(--accent)">${g}</span>`).join('')}</div>` : ''}
        ${p.source ? `<div class="card-source">${p.source}</div>` : ''}
      </div>
    </div>`).join('');
}

buildAlphabet();
buildGenres();
buildStatus();

window.openModal = function(idx) {
  const p = items[idx];
  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="m-hero">
      <div class="m-hero-left">
        <div class="m-photo"><img src="${p.img}" alt="${p.name}"></div>
      </div>
      <div class="m-hero-right">
        <div class="m-author">${p.author}</div>
        <div class="m-name">${p.name}</div>
        ${p.original ? `<div class="m-subtitle">${p.original}</div>` : ''}
      </div>
    </div>
    <div class="m-content">
      <div class="m-desc">
        <div class="m-section-title">О книге</div>
        <div class="m-desc-text">${p.desc}</div>
      </div>
      ${(p.genre||[]).length ? `<div class="m-tags">${p.genre.map(g=>`<span class="m-pill">${g}</span>`).join('')}</div>` : ''}
      ${p.source ? `<div class="m-source">${p.source}</div>` : ''}
    </div>`;
  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

window.closeModal = function() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
}
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

search.addEventListener('input', render);

// На случай BFCache/восстановления вкладки — всегда показываем полный список
window.addEventListener('pageshow', () => {
  search.value = '';
  activeLetter = null;
  activeGenre = null;
  activeStatus = null;
  alphabetBar.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#genreBar .genre-btn, #genreMenuList .genre-btn').forEach((b) => b.classList.toggle('active', !b.dataset.genre));
  statusBar.querySelectorAll('.status-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  render();
});

render();
</script>

<style id="oc-pager-top-style">
  .oc-top-btn{position:fixed;right:18px;bottom:18px;z-index:9999;border:none;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.18);background:#111;color:#fff;opacity:0;pointer-events:none;transition:.2s}
  .oc-top-btn.show{opacity:1;pointer-events:auto}
  .oc-pager{display:flex;gap:8px;justify-content:center;align-items:center;margin:18px 0 8px;flex-wrap:wrap}
  .oc-pager button{border:1px solid #ddd;background:#fff;padding:6px 10px;border-radius:10px;cursor:pointer}
  .oc-pager button:disabled{opacity:.45;cursor:not-allowed}
</style>
<script id="oc-pager-top-script">
(function(){
  // Back to top button for every page
  const topBtn=document.createElement('button');
  topBtn.className='oc-top-btn';
  topBtn.textContent='↑ Наверх';
  topBtn.setAttribute('aria-label','Наверх');
  topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  document.body.appendChild(topBtn);
  const onScroll=()=>topBtn.classList.toggle('show',window.scrollY>320);
  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();

  // Generic DOM pagination for long catalog pages
  const findContainer=()=>{
    const candidates=['.grid','.cards','.items','#grid','#cards','.catalog-grid','.products','.list'];
    for(const sel of candidates){
      const el=document.querySelector(sel);
      if(el && el.children && el.children.length>24) return el;
    }
    const all=[...document.querySelectorAll('main section, main div, section, .container > div')];
    return all.find(el=>el.children && el.children.length>24) || null;
  };

  const setupPager=()=>{
    if(document.querySelector('.oc-pager')) return;
    const container=findContainer();
    if(!container) return;
    const items=[...container.children].filter(el=>!el.classList.contains('oc-pager'));
    if(items.length<=24) return;

    let page=1; const pageSize=24; const pages=Math.ceil(items.length/pageSize);
    const pager=document.createElement('div'); pager.className='oc-pager';
    const prev=document.createElement('button'); prev.textContent='← Назад';
    const next=document.createElement('button'); next.textContent='Вперёд →';
    const meta=document.createElement('span');
    pager.append(prev,meta,next);
    container.after(pager);

    const render=()=>{
      const start=(page-1)*pageSize, end=start+pageSize;
      items.forEach((el,i)=>{el.style.display=(i>=start && i<end)?'':'none';});
      meta.textContent=`Страница ${page} / ${pages}`;
      prev.disabled=page===1; next.disabled=page===pages;
      window.scrollTo({top:0,behavior:'smooth'});
    };
    prev.onclick=()=>{if(page>1){page--;render();}};
    next.onclick=()=>{if(page<pages){page++;render();}};
    render();
  };

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>setTimeout(setupPager,250));
  else setTimeout(setupPager,250);
  const mo=new MutationObserver(()=>setTimeout(setupPager,100));
  mo.observe(document.body,{childList:true,subtree:true});
})();
</script>
