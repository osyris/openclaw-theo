<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 Shopping List</title>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #8b7355;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C8B75' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .notebook {
            max-width: 600px;
            width: 100%;
        }
        .notebook-cover {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }
        .notebook-cover h1 {
            font-family: 'Pangolin', cursive;
            font-size: 2.4rem;
            color: #f5f0e8;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .notebook-cover .subtitle {
            font-family: 'Pangolin', cursive;
            font-size: 1.1rem;
            color: #d4c8b0;
            margin-top: 4px;
        }
        .page {
            background: #fdf8f0;
            border-radius: 8px;
            padding: 28px 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
            background-image:
                repeating-linear-gradient(
                    transparent,
                    transparent 31px,
                    #e8ddd0 31px,
                    #e8ddd0 32px
                );
            background-position: 0 20px;
        }
        .page::before {
            content: '';
            position: absolute;
            left: 50px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(220, 100, 100, 0.2);
        }
        .category {
            margin-bottom: 24px;
        }
        .category:last-child {
            margin-bottom: 0;
        }
        .category-title {
            font-family: 'Pangolin', cursive;
            font-size: 1.3rem;
            color: #8b6914;
            margin-bottom: 12px;
            padding-left: 60px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .items {
            list-style: none;
            padding-left: 60px;
        }
        .items li {
            padding: 4px 0;
            font-size: 1rem;
            color: #4a4035;
            line-height: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        .items li .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #c4b59a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .items li.checked .checkbox {
            background: #8b7355;
            border-color: #8b7355;
        }
        .items li.checked .checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 700;
        }
        .items li.checked .item-text {
            text-decoration: line-through;
            color: #b0a595;
        }
        .item-text {
            transition: all 0.2s;
        }
        .item-qty {
            color: #a09080;
            font-size: 0.85rem;
            margin-left: auto;
            padding-right: 10px;
        }
        .empty-message {
            padding-left: 60px;
            color: #b0a595;
            font-style: italic;
            line-height: 32px;
        }
        .updated {
            text-align: center;
            color: #d4c8b0;
            font-size: 0.85rem;
            margin-top: 16px;
            font-family: 'Pangolin', cursive;
        }
        @media (max-width: 480px) {
            body { padding: 10px; }
            .page { padding: 20px 16px; }
            .category-title { padding-left: 40px; font-size: 1.1rem; }
            .items { padding-left: 40px; }
            .page::before { left: 32px; }
            .notebook-cover h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="notebook">
        <div class="notebook-cover">
            <h1>🛒 Shopping List</h1>
            <div class="subtitle">Нажми на товар, чтобы отметить ✓</div>
        </div>

        <div class="page" id="shopping-list">
            <div class="empty-message">Список пуст — скажи Тео, что добавить! ☀️</div>
        </div>

        <div class="updated" id="updated"></div>
    </div>

    <script>
        // Shopping list data — Тео обновляет этот блок
        const SHOPPING_DATA = {
            updated: "2026-02-23",
            categories: [
                // {
                //     name: "🥬 Продукты",
                //     emoji: "🥬",
                //     items: [
                //         { text: "Молоко", qty: "1л" },
                //         { text: "Яйца", qty: "10 шт" },
                //     ]
                // },
            ]
        };

        function render() {
            const container = document.getElementById('shopping-list');
            const updatedEl = document.getElementById('updated');

            if (!SHOPPING_DATA.categories.length) {
                container.innerHTML = '<div class="empty-message">Список пуст — скажи Тео, что добавить! ☀️</div>';
                return;
            }

            // Load checked state from localStorage
            const checked = JSON.parse(localStorage.getItem('shopping-checked') || '{}');

            let html = '';
            SHOPPING_DATA.categories.forEach(cat => {
                html += `<div class="category">`;
                html += `<div class="category-title">${cat.name}</div>`;
                html += `<ul class="items">`;
                cat.items.forEach((item, idx) => {
                    const key = `${cat.name}-${idx}`;
                    const isChecked = checked[key] ? 'checked' : '';
                    html += `<li class="${isChecked}" onclick="toggleItem(this, '${key}')">
                        <span class="checkbox"></span>
                        <span class="item-text">${item.text}</span>
                        ${item.qty ? `<span class="item-qty">${item.qty}</span>` : ''}
                    </li>`;
                });
                html += `</ul></div>`;
            });

            container.innerHTML = html;
            updatedEl.textContent = `Обновлено: ${SHOPPING_DATA.updated}`;
        }

        function toggleItem(el, key) {
            el.classList.toggle('checked');
            const checked = JSON.parse(localStorage.getItem('shopping-checked') || '{}');
            if (el.classList.contains('checked')) {
                checked[key] = true;
            } else {
                delete checked[key];
            }
            localStorage.setItem('shopping-checked', JSON.stringify(checked));
        }

        render();
    </script>
</body>
</html>
