<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌴 Bali Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --card-hover: #222;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #27ae60;
    --accent-light: #2ecc71;
    --accent-glow: rgba(39,174,96,0.4);
    --border: #2a2a2a;
    --surface: #141414;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; font-weight:300; min-height:100vh; }

  /* Hero */
  .hero {
    text-align:center; padding:1.5rem 1.5rem 3rem;
    background: linear-gradient(180deg, #0a1a0f 0%, #0d0d0d 100%);
    position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle, rgba(39,174,96,0.12) 0%, transparent 70%);
    pointer-events:none;
  }
  .hero h1 {
    font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:4.5rem;
    letter-spacing:0.12em; color:var(--accent-light);
    text-transform:uppercase; text-shadow:0 0 60px var(--accent-glow);
    position:relative;
  }
  .hero p {
    color:var(--muted); font-size:0.85rem; letter-spacing:0.2em;
    text-transform:uppercase; margin-top:0.5rem; position:relative;
  }

  /* Controls */
  .controls {
    max-width:1100px; margin:0 auto; padding:1.5rem 1.5rem 0.5rem;
    display:flex; flex-wrap:wrap; gap:0.5rem; align-items:center;
  }
  .search-box {
    flex:1; min-width:200px; padding:0.7rem 1.2rem;
    border:1px solid var(--border); border-radius:2rem;
    font-size:0.85rem; font-family:inherit;
    background:var(--surface); color:var(--text); outline:none;
    transition:border-color 0.2s;
  }
  .search-box:focus { border-color:var(--accent); box-shadow:0 0 15px rgba(39,174,96,0.15); }
  .search-box::placeholder { color:#555; }

  .filter-btn {
    padding:0.55rem 1.3rem; border:1px solid var(--border); border-radius:2rem;
    background:var(--surface); font-size:0.95rem; font-family:'Bebas Neue',sans-serif;
    cursor:pointer; transition:all 0.2s; color:#777;
    text-transform:uppercase; letter-spacing:0.1em;
  }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent-light); }
  .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .sub-filters {
    max-width:1100px; margin:0 auto; padding:0.5rem 1.5rem;
    display:flex; flex-wrap:wrap; gap:0.35rem; align-items:center;
  }
  .price-btn {
    padding:0.3rem 0.9rem; border:1px solid var(--border); border-radius:2rem;
    background:transparent; font-size:0.78rem; font-family:inherit; font-weight:500;
    cursor:pointer; transition:all 0.2s; color:#666;
    letter-spacing:0.06em;
  }
  .price-btn:hover { border-color:var(--accent); color:var(--accent-light); }
  .price-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .open-now-wrap {
    display:flex; align-items:center; gap:0.4rem; margin-left:auto;
    font-size:0.78rem; color:var(--muted); cursor:pointer; user-select:none;
  }
  .open-now-wrap input { accent-color: var(--accent); cursor:pointer; }

  .count {
    width:100%; text-align:right; font-size:0.75rem; color:var(--muted);
    padding:0.3rem 1.5rem; max-width:1100px; margin:0 auto;
  }

  /* Grid */
  .grid {
    max-width:1100px; margin:0 auto; padding:0.5rem 1.5rem 4rem;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1rem;
  }

  /* Card */
  .card {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    overflow:hidden; transition:all 0.25s; cursor:pointer;
    display:flex; flex-direction:column;
  }
  .card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 30px rgba(39,174,96,0.08); }

  .card-header {
    padding:1.2rem 1.2rem 0.6rem; display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem;
  }
  .card-title {
    font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.04em;
    color:var(--text); line-height:1.2;
  }
  .card-title a { color:inherit; text-decoration:none; transition:color 0.2s; }
  .card-title a:hover { color:var(--accent-light); }

  .card-type {
    flex-shrink:0; padding:0.2rem 0.7rem; border-radius:2rem;
    font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em; font-weight:500;
    white-space:nowrap;
  }
  .type-restaurant { background:rgba(39,174,96,0.15); color:#2ecc71; }
  .type-cafe { background:rgba(52,152,219,0.15); color:#3498db; }
  .type-attraction { background:rgba(241,196,15,0.15); color:#f1c40f; }
  .type-spa { background:rgba(155,89,182,0.15); color:#9b59b6; }
  .type-event { background:rgba(231,76,60,0.15); color:#e74c3c; }
  .type-tour { background:rgba(230,126,34,0.15); color:#e67e22; }

  .card-body { padding:0 1.2rem 1rem; flex:1; }

  .card-meta {
    display:flex; flex-wrap:wrap; gap:0.3rem 0.8rem; margin-bottom:0.6rem;
    font-size:0.78rem; color:var(--muted);
  }
  .card-meta span { display:inline-flex; align-items:center; gap:0.25rem; }

  .card-desc {
    font-size:0.82rem; color:#aaa; line-height:1.5; margin-bottom:0.6rem;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }

  .card-tags { display:flex; flex-wrap:wrap; gap:0.25rem; margin-bottom:0.6rem; }
  .tag {
    padding:0.15rem 0.5rem; border-radius:2rem; font-size:0.65rem;
    background:rgba(255,255,255,0.06); color:#888; border:1px solid rgba(255,255,255,0.08);
  }

  .card-cuisines {
    font-size:0.72rem; color:var(--accent-light); margin-bottom:0.5rem;
  }

  .card-footer {
    padding:0.6rem 1.2rem; border-top:1px solid var(--border);
    display:flex; flex-wrap:wrap; gap:0.4rem 0.8rem; align-items:center;
    font-size:0.72rem;
  }
  .card-footer a {
    color:var(--accent-light); text-decoration:none; transition:color 0.2s;
  }
  .card-footer a:hover { color:#fff; }
  .card-footer .address-link { color:var(--muted); }
  .card-footer .address-link:hover { color:var(--accent-light); }

  .schedule-badge {
    display:inline-flex; align-items:center; gap:0.3rem;
    font-size:0.72rem;
  }
  .schedule-badge .dot {
    width:6px; height:6px; border-radius:50%; flex-shrink:0;
  }
  .dot-open { background:#2ecc71; box-shadow:0 0 6px rgba(46,204,113,0.5); }
  .dot-closed { background:#e74c3c; }

  .no-results {
    grid-column:1/-1; text-align:center; padding:3rem; color:var(--muted);
    font-size:0.9rem;
  }

  /* Footer */
  .page-footer {
    text-align:center; padding:2rem; font-size:0.72rem; color:#555;
    border-top:1px solid var(--border);
  }
  .page-footer a { color:var(--accent); text-decoration:none; }

  /* Modal */
  .modal-overlay {
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); z-index:100; backdrop-filter:blur(6px);
    justify-content:center; align-items:flex-start; padding:2rem 1rem;
    overflow-y:auto;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:#1a1a1a; border-radius:16px; max-width:640px; width:100%;
    position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.5);
    margin:auto; overflow:hidden; border:1px solid var(--border);
  }
  .modal-close {
    position:absolute; top:0.8rem; right:0.8rem; background:rgba(255,255,255,0.08);
    border:none; font-size:1.4rem; cursor:pointer; color:#888; line-height:1;
    z-index:2; width:36px; height:36px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; transition:all 0.2s;
  }
  .modal-close:hover { color:#fff; background:rgba(255,255,255,0.15); }

  .m-header {
    padding:1.8rem 2rem 1.2rem; border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, #1e1e1e 0%, #1a1a1a 100%);
  }
  .m-title-row { display:flex; justify-content:space-between; align-items:flex-start; gap:0.8rem; margin-bottom:0.6rem; padding-top:1.5rem; }
  .m-name { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.04em; color:var(--text); line-height:1.2; }
  .m-type-badge {
    flex-shrink:0; padding:0.25rem 0.8rem; border-radius:2rem;
    font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; font-weight:500;
    white-space:nowrap;
  }
  .m-district { font-size:0.82rem; color:var(--muted); margin-bottom:0.5rem; }
  .m-status {
    display:inline-flex; align-items:center; gap:0.35rem;
    font-size:0.78rem; font-weight:500; padding:0.25rem 0.7rem;
    border-radius:2rem;
  }
  .m-status.open { background:rgba(46,204,113,0.12); color:#2ecc71; }
  .m-status.closed { background:rgba(231,76,60,0.12); color:#e74c3c; }
  .m-status .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

  .m-content { padding:1.5rem 2rem 2rem; }
  .m-section { margin-bottom:1.2rem; }
  .m-section-title {
    font-size:0.68rem; text-transform:uppercase; letter-spacing:0.14em;
    color:var(--muted); font-weight:500; margin-bottom:0.5rem;
  }
  .m-desc-text { font-size:0.88rem; color:#ccc; line-height:1.7; }
  .m-meta-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:0.5rem 1.2rem;
  }
  .m-meta-item { display:flex; flex-direction:column; }
  .m-meta-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em; color:#666; margin-bottom:0.1rem; }
  .m-meta-value { font-size:0.85rem; color:var(--text); }
  .m-tags { display:flex; flex-wrap:wrap; gap:0.3rem; }
  .m-tags .tag { font-size:0.7rem; padding:0.2rem 0.6rem; }
  .m-cuisines { font-size:0.85rem; color:var(--accent-light); }

  .m-links { display:flex; flex-direction:column; gap:0.5rem; margin-top:1.2rem; }
  .m-link-btn {
    display:flex; align-items:center; gap:0.6rem; padding:0.7rem 1rem;
    background:rgba(255,255,255,0.04); border:1px solid var(--border);
    border-radius:10px; color:var(--text); text-decoration:none;
    font-size:0.85rem; transition:all 0.2s;
  }
  .m-link-btn:hover { border-color:var(--accent); background:rgba(39,174,96,0.08); color:var(--accent-light); }
  .m-link-btn .link-emoji { font-size:1.1rem; }

  /* Mobile */
  @media(max-width:700px) {
    .hero h1 { font-size:3rem; }
    .grid { grid-template-columns:1fr; padding:0.5rem 1rem 3rem; }
    .controls { padding:1rem; }
    .sub-filters { padding:0.5rem 1rem; }
    .count { padding:0.3rem 1rem; }
    .m-header { padding:1.5rem 1.2rem 1rem; }
    .m-content { padding:1.2rem; }
    .m-name { font-size:1.6rem; }
    .m-meta-grid { grid-template-columns:1fr; }
    .modal { border-radius:12px; }
  }
</style>
</head>
<body>
<div class="hero">
  <div style="max-width:900px;margin:0 auto;padding:0 1.5rem;text-align:left;">
    <a href="/pages/" style="display:inline-block;padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.3);border-radius:2rem;font-family:'Inter',sans-serif;font-size:0.75rem;color:#fff;text-decoration:none;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.2s;opacity:0.7;" onmouseover="this.style.opacity='1';this.style.borderColor='rgba(255,255,255,0.6)'" onmouseout="this.style.opacity='0.7';this.style.borderColor='rgba(255,255,255,0.3)'">← Back</a>
  </div>
  <h1>🌴 BALI GUIDE</h1>
  <p>Места, которые стоит посетить</p>
</div>

<div style="max-width:1100px;margin:0 auto;padding:1rem 1.5rem 0;">
  <a href="/pages/bali-guide/amed.html" style="display:block;padding:1rem 1.5rem;background:linear-gradient(135deg,rgba(39,174,96,0.15),rgba(39,174,96,0.05));border:1px solid var(--accent);border-radius:12px;text-decoration:none;transition:all 0.25s;text-align:center;">
    <span style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent-light);letter-spacing:0.08em;">🏝️ Гайд по Амеду →</span>
    <span style="display:block;font-size:0.78rem;color:var(--muted);margin-top:0.3rem;">Чёрные пляжи, дайвинг, рестораны и достопримечательности восточного Бали</span>
  </a>
</div>

<div class="controls">
  <input type="text" class="search-box" id="search" placeholder="🔍 Поиск по названию...">
  <button class="filter-btn active" data-type="all">Все</button>
  <button class="filter-btn" data-type="restaurant">Рестораны</button>
  <button class="filter-btn" data-type="cafe">Кафе</button>
  <button class="filter-btn" data-type="attraction">Достопримечательности</button>
  <button class="filter-btn" data-type="spa">СПА</button>
  <button class="filter-btn" data-type="event">События</button>
  <button class="filter-btn" data-type="tour">Туры</button>
</div>

<div class="sub-filters">
  <button class="price-btn active" data-price="all">Все цены</button>
  <button class="price-btn" data-price="$">$</button>
  <button class="price-btn" data-price="$$">$$</button>
  <button class="price-btn" data-price="$$$">$$$</button>
  <label class="open-now-wrap">
    <input type="checkbox" id="openNow"> Открыто сейчас
  </label>
</div>

<div class="count" id="count"></div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<div class="page-footer">
  Данные: <a href="https://baliforum.ru" target="_blank">baliforum.ru</a> · Время по Бали (WITA, UTC+8)
</div>

<script>
let places = [];

fetch('/pages/bali-guide/places.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => { places = data; initApp(); })
  .catch(() => { places = []; initApp(); });

function initApp() {
  render();
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeType = btn.dataset.type;
      render();
    });
  });
  document.querySelectorAll('.price-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activePrice = btn.dataset.price;
      render();
    });
  });
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });
  document.getElementById('openNow').addEventListener('change', e => {
    openNowFilter = e.target.checked;
    render();
  });
  setInterval(render, 60000);
}

const typeLabels = {
  restaurant: "Ресторан",
  cafe: "Кафе",
  attraction: "Достопримечательность",
  spa: "СПА",
  event: "Событие",
  tour: "Тур"
};

const typeEmojis = {
  restaurant: "🍽️",
  cafe: "☕",
  attraction: "🎭",
  spa: "🧖",
  event: "🎪",
  tour: "🗺️"
};

function getBaliTime() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 8 * 3600000);
}

function isOpenNow(place) {
  if (place.isEvent) return false;
  const bali = getBaliTime();
  const day = bali.getDay(); // 0=Sun
  const hh = bali.getHours();
  const mm = bali.getMinutes();
  const nowMins = hh * 60 + mm;

  return place.schedule.some(s => {
    if (!s.daysArr || !s.daysArr.includes(day)) return false;
    const [fh, fm] = s.from.split(':').map(Number);
    const [th, tm] = s.to.split(':').map(Number);
    const fromMins = fh * 60 + fm;
    const toMins = th * 60 + tm;
    if (toMins > fromMins) {
      return nowMins >= fromMins && nowMins < toMins;
    } else {
      return nowMins >= fromMins || nowMins < toMins;
    }
  });
}

let activeType = 'all';
let activePrice = 'all';
let searchQuery = '';
let openNowFilter = false;

function render() {
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');

  let filtered = places.filter(p => {
    if (activeType !== 'all' && p.type !== activeType) return false;
    if (activePrice !== 'all' && p.price !== activePrice) return false;
    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    if (openNowFilter && !isOpenNow(p)) return false;
    return true;
  });

  countEl.textContent = `Найдено: ${filtered.length}`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">Ничего не найдено 🌿</div>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const open = isOpenNow(p);
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
    const bfUrl = p.isEvent
      ? `https://baliforum.ru/events/${p.slug}`
      : `https://baliforum.ru/places/${p.slug}`;

    const scheduleHtml = p.schedule.map(s => `${s.days}: ${s.from}–${s.to}`).join(' · ');

    const tagsHtml = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const cuisinesHtml = p.cuisines.length ? `<div class="card-cuisines">🍴 ${p.cuisines.join(', ')}</div>` : '';

    const linksHtml = [
      `<a href="${bfUrl}" target="_blank">📖 baliforum</a>`,
      p.website ? `<a href="${p.website}" target="_blank">🌐 сайт</a>` : '',
      p.instagram ? `<a href="${p.instagram}" target="_blank">📸 instagram</a>` : ''
    ].filter(Boolean).join('');

    const idx = places.indexOf(p);
    return `
      <div class="card" onclick="openModal(${idx})">
        <div class="card-header">
          <div class="card-title">${p.name}</div>
          <span class="card-type type-${p.type}">${typeEmojis[p.type]} ${typeLabels[p.type]}</span>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <span>📍 ${p.district}</span>
            <span>💰 ${p.price}</span>
            <span class="schedule-badge">
              <span class="dot ${open ? 'dot-open' : 'dot-closed'}"></span>
              ${scheduleHtml}
            </span>
          </div>
          ${cuisinesHtml}
          <div class="card-desc">${p.description}</div>
          ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        </div>
        <div class="card-footer">
          ${linksHtml}
          <span class="address-link" style="margin-left:auto">📍 ${p.address}</span>
        </div>
      </div>
    `;
  }).join('');
}

// Modal
const modalOverlay = document.getElementById('modalOverlay');
const modal = document.getElementById('modal');

window.openModal = function(idx) {
  const p = places[idx];
  if (!p) return;
  const open = isOpenNow(p);
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
  const bfUrl = p.isEvent
    ? `https://baliforum.ru/events/${p.slug}`
    : `https://baliforum.ru/places/${p.slug}`;
  const scheduleHtml = p.schedule.map(s => `${s.days}: ${s.from}–${s.to}`).join('<br>');
  const tagsHtml = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
  const cuisinesHtml = p.cuisines.length ? p.cuisines.join(', ') : '';

  let linksHtml = '';
  linksHtml += `<a href="${mapsUrl}" target="_blank" class="m-link-btn" onclick="event.stopPropagation()"><span class="link-emoji">📍</span> Google Maps — ${p.address}</a>`;
  if (p.slug) linksHtml += `<a href="${bfUrl}" target="_blank" class="m-link-btn" onclick="event.stopPropagation()"><span class="link-emoji">📖</span> Baliforum</a>`;
  if (p.website) linksHtml += `<a href="${p.website}" target="_blank" class="m-link-btn" onclick="event.stopPropagation()"><span class="link-emoji">🌐</span> Сайт</a>`;
  if (p.instagram) linksHtml += `<a href="${p.instagram}" target="_blank" class="m-link-btn" onclick="event.stopPropagation()"><span class="link-emoji">📸</span> Instagram</a>`;

  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="m-header">
      <div class="m-title-row">
        <div class="m-name">${p.name}</div>
        <span class="m-type-badge type-${p.type}">${typeEmojis[p.type]} ${typeLabels[p.type]}</span>
      </div>
      <div class="m-district">📍 ${p.district}</div>
      <span class="m-status ${open ? 'open' : 'closed'}">
        <span class="dot ${open ? 'dot-open' : 'dot-closed'}"></span>
        ${open ? 'Открыто сейчас' : 'Закрыто'}
      </span>
    </div>
    <div class="m-content">
      <div class="m-section">
        <div class="m-section-title">Описание</div>
        <div class="m-desc-text">${p.description}</div>
      </div>
      <div class="m-section">
        <div class="m-meta-grid">
          <div class="m-meta-item">
            <span class="m-meta-label">Расписание</span>
            <span class="m-meta-value">${scheduleHtml}</span>
          </div>
          <div class="m-meta-item">
            <span class="m-meta-label">Ценовая категория</span>
            <span class="m-meta-value" style="color:var(--accent-light)">${p.price}</span>
          </div>
          ${cuisinesHtml ? `<div class="m-meta-item"><span class="m-meta-label">Кухня</span><span class="m-meta-value m-cuisines">🍴 ${cuisinesHtml}</span></div>` : ''}
        </div>
      </div>
      ${tagsHtml ? `<div class="m-section"><div class="m-section-title">Теги</div><div class="m-tags">${tagsHtml}</div></div>` : ''}
      <div class="m-links">${linksHtml}</div>
    </div>
  `;
  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeModal = function() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
};

modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// App initialized via fetch callback above
</script>


<style id="oc-pager-top-style">
  .oc-top-btn{position:fixed;right:18px;bottom:18px;z-index:9999;border:none;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.18);background:#111;color:#fff;opacity:0;pointer-events:none;transition:.2s}
  .oc-top-btn.show{opacity:1;pointer-events:auto}
  .oc-pager{display:flex;gap:8px;justify-content:center;align-items:center;margin:18px 0 8px;flex-wrap:wrap}
  .oc-pager button{border:1px solid #ddd;background:#fff;padding:6px 10px;border-radius:10px;cursor:pointer}
  .oc-pager button:disabled{opacity:.45;cursor:not-allowed}
</style>
<script id="oc-pager-top-script">
(function(){
  // Back to top button for every page
  const topBtn=document.createElement('button');
  topBtn.className='oc-top-btn';
  topBtn.textContent='↑ Наверх';
  topBtn.setAttribute('aria-label','Наверх');
  topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  document.body.appendChild(topBtn);
  const onScroll=()=>topBtn.classList.toggle('show',window.scrollY>320);
  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();

  // Generic DOM pagination for long catalog pages
  const findContainer=()=>{
    const candidates=['.grid','.cards','.items','#grid','#cards','.catalog-grid','.products','.list'];
    for(const sel of candidates){
      const el=document.querySelector(sel);
      if(el && el.children && el.children.length>24) return el;
    }
    const all=[...document.querySelectorAll('main section, main div, section, .container > div')];
    return all.find(el=>el.children && el.children.length>24) || null;
  };

  const setupPager=()=>{
    if(document.querySelector('.oc-pager')) return;
    const container=findContainer();
    if(!container) return;
    const items=[...container.children].filter(el=>!el.classList.contains('oc-pager'));
    if(items.length<=24) return;

    let page=1; const pageSize=24; const pages=Math.ceil(items.length/pageSize);
    const pager=document.createElement('div'); pager.className='oc-pager';
    const prev=document.createElement('button'); prev.textContent='← Назад';
    const next=document.createElement('button'); next.textContent='Вперёд →';
    const meta=document.createElement('span');
    pager.append(prev,meta,next);
    container.after(pager);

    const render=()=>{
      const start=(page-1)*pageSize, end=start+pageSize;
      items.forEach((el,i)=>{el.style.display=(i>=start && i<end)?'':'none';});
      meta.textContent=`Страница ${page} / ${pages}`;
      prev.disabled=page===1; next.disabled=page===pages;
      window.scrollTo({top:0,behavior:'smooth'});
    };
    prev.onclick=()=>{if(page>1){page--;render();}};
    next.onclick=()=>{if(page<pages){page++;render();}};
    render();
  };

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>setTimeout(setupPager,250));
  else setTimeout(setupPager,250);
  const mo=new MutationObserver(()=>setTimeout(setupPager,100));
  mo.observe(document.body,{childList:true,subtree:true});
})();
</script>
