</head>

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const countEl = document.getElementById('count');
const modalOverlay = document.getElementById('modalOverlay');
const modal = document.getElementById('modal');

function render() {
  const q = search.value.toLowerCase();
  const filtered = items.map((p,i)=>({...p,idx:i})).filter(p => {
    return !q || [p.name, p.desc, p.source].join(' ').toLowerCase().includes(q);
  });
  countEl.textContent = filtered.length + ' из ' + items.length + ' средств';
  grid.innerHTML = filtered.map(p => `
    <div class="card" onclick="openModal(${p.idx})">
      <div class="card-img"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        ${p.price ? `<div class="card-price">${p.price}</div>` : ''}
        <div class="card-desc">${p.desc}</div>
        ${p.source ? `<div class="card-source">${p.source}</div>` : ''}
      </div>
    </div>`).join('');
}

window.openModal = function(idx) {
  const p = items[idx];
  const galleryHTML = p.imgs && p.imgs.length > 1
    ? `<div class="m-gallery">${p.imgs.map(i => `<img src="${i}" alt="${p.name}" loading="lazy">`).join('')}</div>`
    : '';
  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="m-hero">
      <div class="m-hero-left">
        <div class="m-photo"><img src="${p.img}" alt="${p.name}"></div>
      </div>
      <div class="m-hero-right">
        <div class="m-name">${p.name}</div>
        ${p.price ? `<div class="m-price">${p.price}</div>` : ''}
      </div>
    </div>
    <div class="m-content">
      ${galleryHTML ? `<div class="m-section-title">Фото</div>${galleryHTML}` : ''}
      <div class="m-desc">
        <div class="m-section-title">Описание</div>
        <div class="m-desc-text">${p.fullDesc}</div>
      </div>
      ${p.source ? `<div class="m-source">${p.source}</div>` : ''}
    </div>`;
  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

window.closeModal = function() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
}
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

search.addEventListener('input', render);
render();
</script>

<style id="oc-pager-top-style">
  .oc-top-btn{position:fixed;right:18px;bottom:18px;z-index:9999;border:none;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.18);background:#111;color:#fff;opacity:0;pointer-events:none;transition:.2s}
  .oc-top-btn.show{opacity:1;pointer-events:auto}
  .oc-pager{display:flex;gap:8px;justify-content:center;align-items:center;margin:18px 0 8px;flex-wrap:wrap}
  .oc-pager button{border:1px solid #ddd;background:#fff;padding:6px 10px;border-radius:10px;cursor:pointer}
  .oc-pager button:disabled{opacity:.45;cursor:not-allowed}
  .oc-pager-nums{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .oc-page-num.active{background:#111;color:#fff;border-color:#111}
  .oc-pager-meta{font-size:12px;color:#666}
</style>
<script id="oc-pager-top-script">
(function(){
  // Back to top button for every page
  const topBtn=document.createElement('button');
  topBtn.className='oc-top-btn';
  topBtn.textContent='↑ Наверх';
  topBtn.setAttribute('aria-label','Наверх');
  topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  document.body.appendChild(topBtn);
  const onScroll=()=>topBtn.classList.toggle('show',window.scrollY>320);
  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();

  // Generic DOM pagination for long catalog pages
  const findContainer=()=>{
    const candidates=['.grid','.cards','.items','#grid','#cards','.catalog-grid','.products','.list'];
    for(const sel of candidates){
      const el=document.querySelector(sel);
      if(el && el.children && el.children.length>24) return el;
    }
    const all=[...document.querySelectorAll('main section, main div, section, .container > div'),
  {
    name: 'Dr. Melaxin Peel Shot P5',
    desc: 'Мягкий пилинг, бережный к кожному барьеру, но дающий очень красивую кожу после использования.',
    fullDesc: 'Dr. Melaxin Peel Shot P5 — мягкий пилинг, который по отзыву очень бережно относится к кожному барьеру, но при этом заметно улучшает вид кожи после использования. Отмечен как сильная рекомендация. На скрине также отмечен @healthyskin.ee.',
    img: 'img/dr-melaxin-peel-shot-p5.jpg',
    imgs: [],
    price: '',
    source: 'Скрин, @healthyskin.ee'
  }
];
    return all.find(el=>el.children && el.children.length>24) || null;
  };

  const setupPager=()=>{
    if(document.querySelector('.oc-pager')) return;
    const container=findContainer();
    if(!container) return;
    const items=[...container.children].filter(el=>!el.classList.contains('oc-pager'));
    if(items.length<=24) return;

    const pageSize=24; const pages=Math.ceil(items.length/pageSize);
    const pageKey='oc:page:'+location.pathname;
    let page=Math.max(1, Math.min(pages, Number(localStorage.getItem(pageKey) || 1)));

    const makePager = () => {
      const pager=document.createElement('div'); pager.className='oc-pager';
      const prev=document.createElement('button'); prev.textContent='← Назад';
      const nums=document.createElement('div'); nums.className='oc-pager-nums';
      const next=document.createElement('button'); next.textContent='Вперёд →';
      const meta=document.createElement('span'); meta.className='oc-pager-meta';
      pager.append(prev,nums,next,meta);
      return {pager,prev,nums,next,meta};
    };

    const topPager = makePager();
    const bottomPager = makePager();
    container.before(topPager.pager);
    container.after(bottomPager.pager);

    const renderNums=(numsEl)=>{
      numsEl.innerHTML='';
      for(let i=1;i<=pages;i++){
        const b=document.createElement('button');
        b.textContent=String(i);
        b.className='oc-page-num'+(i===page?' active':'');
        b.addEventListener('click',()=>{page=i;render();});
        numsEl.appendChild(b);
      }
    };

    const syncPager=(p)=>{
      p.meta.textContent=`Страница ${page} / ${pages}`;
      p.prev.disabled=page===1; p.next.disabled=page===pages;
      renderNums(p.nums);
    };

    const render=()=>{
      const start=(page-1)*pageSize, end=start+pageSize;
      items.forEach((el,i)=>{el.style.display=(i>=start && i<end)?'':'none';});
      syncPager(topPager);
      syncPager(bottomPager);
      localStorage.setItem(pageKey, String(page));
      window.scrollTo({top:0,behavior:'smooth'});
    };

    const bindPager=(p)=>{
      p.prev.onclick=()=>{if(page>1){page--;render();}};
      p.next.onclick=()=>{if(page<pages){page++;render();}};
    };

    bindPager(topPager);
    bindPager(bottomPager);
    render();
  };

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>setTimeout(setupPager,250));
  else setTimeout(setupPager,250);
  const mo=new MutationObserver(()=>setTimeout(setupPager,100));
  mo.observe(document.body,{childList:true,subtree:true});
})();
</script>
