<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Куда сходить</title>
  <style>
    body{font-family:Inter,system-ui;background:#0f0f10;color:#f3f3f3;margin:0}
    .hero{padding:28px 18px 22px;background:#161618}
    .hero h1{margin:0;font-size:34px}.hero p{margin:6px 0 0;color:#aaa}
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .cat{margin:18px 0}.cat h2{font-size:20px;margin:0 0 10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
    .card{background:#1b1b1e;border:1px solid #2a2a2e;border-radius:14px;overflow:hidden;cursor:pointer}
    .thumb{height:150px;background:#222;display:flex;align-items:center;justify-content:center;color:#888;font-size:14px}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .card-body{padding:12px}
    .name{font-weight:700}.meta{color:#bbb;font-size:13px;margin-top:4px}
    .notes{color:#d5d5d5;font-size:14px;margin-top:8px;line-height:1.35}
    .back{display:inline-block;margin-bottom:10px;color:#ddd;text-decoration:none}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}
    .modal.open{display:flex}
    .panel{background:#18181b;border:1px solid #2e2e35;border-radius:14px;max-width:760px;width:100%;overflow:hidden}
    .panel img{width:100%;max-height:320px;object-fit:cover;background:#222}
    .panel-body{padding:16px}
    .panel h3{margin:0 0 8px}
    .panel .row{margin:8px 0;color:#d2d2d7}
    .map{display:inline-block;margin-top:10px;color:#8bc5ff}
    .close{float:right;background:none;border:none;color:#bbb;font-size:20px;cursor:pointer}
  </style>
</head>
<body>
  <div class="hero"><div class="wrap"><h1>Куда сходить</h1><p>Личные подборки мест: еда, self-care, активности</p></div></div>
  <div class="wrap">
    <a class="back" href="/pages/">← На главную</a>
    <div id="app"></div>
  </div>

  <div class="modal" id="modal"><div class="panel" id="panel"></div></div>

<script>
let DATA={categories:[]};
fetch('places.json').then(r=>r.json()).then(data=>{DATA=data;render();});

function esc(s){return (s||'').toString()}

function render(){
  const app=document.getElementById('app');
  app.innerHTML=(DATA.categories||[]).map(c=>`<section class="cat"><h2>${esc(c.name)}</h2><div class="grid">${(c.items||[]).map((i,ix)=>`<article class="card" data-cat="${esc(c.id)}" data-ix="${ix}"><div class="thumb">${i.image?`<img src="${esc(i.image)}" alt="">`:'Фото места'}</div><div class="card-body"><div class="name">${esc(i.name)}</div><div class="meta">${esc(i.area||'')} ${i.price?`• ${esc(i.price)}`:''}</div><div class="notes">${esc(i.notes||'')}</div></div></article>`).join('')}</div></section>`).join('');

  document.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click',()=>{
      const cat=el.dataset.cat; const ix=Number(el.dataset.ix);
      const c=(DATA.categories||[]).find(x=>x.id===cat); if(!c) return;
      const i=(c.items||[])[ix]; if(!i) return;
      openItem(i,c.name);
    })
  })
}

function openItem(i,catName){
  const panel=document.getElementById('panel');
  panel.innerHTML=`${i.image?`<img src="${esc(i.image)}" alt="">`:''}<div class="panel-body"><button class="close" onclick="closeModal()">✕</button><h3>${esc(i.name)}</h3><div class="row">${esc(catName)} ${i.area?`• ${esc(i.area)}`:''} ${i.price?`• ${esc(i.price)}`:''}</div><div class="row">${esc(i.notes||'')}</div>${i.map?`<a class="map" target="_blank" href="${esc(i.map)}">Открыть в Google Maps</a>`:''}</div>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',(e)=>{if(e.target.id==='modal')closeModal();});
</script>
</body>
</html>
